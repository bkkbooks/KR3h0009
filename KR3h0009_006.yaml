  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0009_WYG_006-1a, image: WYG0812/WYG0812-0326a.png}
body:
  text: 厯代名畫記卷六唐張彥逺撰宋陸探微上品上吳人也宋明帝時常在侍從丹青之妙最推工者宋書有名謝赫評云畫有六法自古作者鮮能備之唯陸探微及衛協備之矣窮理盡性事絶言象包前孕後古今獨立非激揚可至銓量之極乎上品之上亡地寄言故居標第一第一品第一人李嗣真云亡地寄言故居標第一此言過當但顧長康之迹可使陸君失步荀朂絶倒然則稱萬代蓍龜衡鏡者顧陸同居上品第一張懷瓘云顧陸及張僧繇評者各重其一皆為當矣陸公參靈酌妙動與神會筆迹徑利如錐刀焉秀骨清像似覺生動令人凛凛若對神明雖妙極象中而思不融乎墨外夫象人風骨張亞於顧陸也張得其肉陸得其骨顧得其神神妙亡方以顧為最比之書則顧陸鍾張也僧繇逸少也俱為古今獨絶豈可以品第拘彥逺以此論為當有宋孝武像宋明帝像孝武功臣竹林像豫章王像嚴龍像宋元微像羊玄寶像宋景和像蟬雀圖建安山陽王像巴陵王像江陵王像江夏王像建平王像江智淵王悅像王粹像王嗣像阮佃夫像勳臣像孫高麗像一人像勳賢像沈慶之像顧慶之像栁元景像王道隆像王翼之像沈曇慶醉像范惠景母子像高麗赭白馬像阿難維摩圖鸂鶒圖王瑩像朱異像麻超之徐僧寶像十一人圖五白馬圖劉亮騧馬圖獼猴圖齊高帝像孔子像十弟子像宋元微像鍾期圖榮啓期孔顔圖竟陵王像殷洪像任侯伯像釋僧虔像徐爰李獻王凱像孫敻著高麗衣圖劉碩錢靈度像徐爰周飾之像謝超宗像宋桂陽王寵姬像劉牢之板像王獻之板像天安寺惠明板像搗衣圖施修林搖錫像江智淵劉季之像太宰像靈基寺瑾統像蔡姬蕩舟圖詩新臺圖鬬鴨圖蕭史圖敘夢賦服乘圖並傳於代者也子綏中品謝云體運遒舉風力頓挫一點一拂動筆新竒簡於繪事傳世蓋寡在第二品顧駿之下袁倩上朝臣像王晏蕭寅像周盤龍麻紙畫立釋迦像傳於世綏弟𢎞肅中品上姚最云早藉庭訓雖所得不多亦有家法在張僧繇毛稜上顧寶光中品上吳郡人善書畫大明中為尚書水部郎見宋書陸探微傳云司徒左曹掾謝云全法陸家事事宗稟方之綏倩則優在第四品蘧道愍下王維史道碩上射雉圖豫章王像泰始名臣圖宋竟陵王像瑾公像鸂鶒圖張興像泰始勳臣像王翼之像勳賢像褚淵衣架圖天竺僧麻紙畫洛中車馬鬬雞圖越中風俗圖並傳於世宗炳字少文中品中南陽涅陽人善書畫江夏王義恭嘗薦炳於宰相前後辟召竟不就善琴書好山水西陟荆巫南登衡嶽因結宇衡山懷尚平之志以疾還江陵歎曰噫老病俱至名山恐難遍遊唯當澄懷觀道卧以遊之凡所遊厯皆圖於壁坐卧向之其高情如此年六十九嘗自為畫山水序曰聖人含道映物賢者澄懷味像至於山水質有而趣靈是以軒轅堯孔廣成大隗許由孤竹之流必有崆洞具茨藐姑箕首大蒙之遊焉又稱仁智之樂焉夫聖人以神法道而賢者通山水以形媚道而仁者樂不亦幾乎余眷戀廬衡契濶荆巫不知老之將至愧不能凝氣怡身傷跕石門之流於是畫象布色構茲雲嶺夫理絶於中古之上者可意求於千載之下旨微於言象之外者可心取於書策之內况乎身所盤桓目所綢繆以形寫形以色貌色也且夫崑崙山之大瞳子之小迫目以寸則其形莫覩逈以數里則可圍於寸眸誠由去之稍濶則其見彌小今張綃素以逺映則崑閬之形可圍於方寸之內竪劃三寸當千仞之高橫墨數尺體百里之迥是以觀畫圖者徒患類之不巧不以制小而纍其似此自然之勢如是則嵩華之秀玄牝之靈皆可得之於一圖矣夫以應目會心為理者類之成巧則目亦同應心亦俱會應會感神神超理得雖復虛求幽巖何以加焉又神本亡端栖形感類理入影迹誠能妙寫亦誠盡矣於是間居理氣拂觴鳴琴披圖幽對坐究四荒不違天勵之藂獨應無人之野峯岫嶤嶷雲林森眇聖賢映於絶代萬趣融其神思余復何為哉暢神而已神之所暢孰有先焉見沈約宋書隱逸傳及炳别傳謝赫云炳於六法亡所遺善然含毫命素必有損益迹非準的意可師效在第六品劉紹祖下毛惠逺上彥逺曰既云必有損益又云非準的既云六法亡所遺善又云可師效謝赫之評固不足采也且宗公高士也飄然物外情不可以俗畫傳其意旨嵇中散白畫孔子弟子像獅子擊象圖穎川先賢圖永嘉邑屋圖周禮圖惠持師像並傳于代凡七本王微字景元下品琅琊臨沂人善書畫嘗居一屋讀書玩古不出十餘年與友人何偃書曰吾性知畫蓋鳴鵠識夜之機盤紆糾紛咸紀心目故山水之好一往迹求皆得髣佛竟不就辟世祖以貞栖絶俗贈祕書監微作敘畫一篇其略曰辱顔光祿書以圖畫非止藝行成當與易象同體而工篆𨽻者自以書巧為高欲其並辨藻繪核其攸同夫言繪畫者竟求容勢而已且古人之作畫也非以案城域辨方州標鎮阜劃􅒓流本乎形者融靈而動者變心止靈亡見故所託不動目有所極故所見不周於是乎以一管之筆擬太虛之體以判軀之狀畫寸眸之明曲以為嵩高趣以為方丈以叐之畫齊乎太華枉之點表夫隆凖眉額頰輔若晏􅀢兮孤巖鬱秀若吐雲兮橫變縱化故動生焉前矩後方出焉然後宫觀舟車器以類聚犬馬禽魚物以狀分此畫之致也望秋雲神飛揚臨春風思浩蕩雖有金石之樂圭璋之琛豈能髣佛之哉披圖按牒效異山海緑林楊風白水激澗嗚呼豈獨運諸指掌亦以明神降之此畫之情也宋書有傳及王智深宋紀序在别傳謝赫云微與史道碩並師荀衛王得其意史傳其似在顧寶光下彥逺論曰圖畫者所以鑒戒賢愚怡悅情性若非窮玄妙於意表安能合神變乎天機宗炳王微皆擬迹巢由放情林壑與琴酒而俱適縱煙霞而獨往各有畫序意逺迹高不知畫者難可與論因著于篇以俟知者謝莊字希逸陳郡陽夏人幼有才學初為始興王濬後軍參軍性多巧思善畫制木方丈圖天下山川土地各有分理離之則州郡殊合之則宇內為一作畫琴帖序自序其畫云泰始二年卒官至光祿大夫散騎常侍兼中書令年四十六贈右光祿大夫諡憲子見宋書乂莊集袁倩中品上謝云北面陸氏最為高足象人之妙亞美前修但守師法不出新意其於婦人特為古拙在第二品陸綏下姚曇度上徐令麻紙豫章王像張暢等像王抗棊圖會獻圖正聲伎圖御臨軒圖朝臣十二人圖吳楚夜踏歌圖豫章王宴賔圖天女白畫東晉高僧白畫二龍圖貌三人像不題名字並冠武辨有太清年月並行於世又維摩詰變一卷百有餘事運思高妙六法備呈置位無差若神靈感會精光指顧得瞻仰威容前使顧陸知慙後得張閻駭歎又有蒼梧圖傳於前代也倩子質姚最云風力爽俊不墜家聲始踰志學之年便嬰顛癎之疾曾見莊周木雁圖卞和抱璞圖筆勢徑健繼父之美若方之體物則伯仁龍馬之詞比之書翰則長胤狸骨之方雖語迹異途而妙理同歸一致史敬文中品上黃帝升仙圖梁冀人馬畫張平子西京賦圖並傳於代史藝下品屈原漁父圖王羲之像孫綽像並傳於代劉斌下品詩黍離圖傳於代尹長生下品或作尹扈生駱簡像山陰公主像南朝貴戚圖車馬圖傳於世顧駿之中品嚴公等像並傳於代康允之中品顧景秀中品上宋武帝時畫手也在陸探微之先居武帝左右武帝嘗賜何戢蟬雀扇是景秀畫後戢為吳興太守齊高帝求好畫扇戢持獻之陸探微顧寶光見之皆歎其巧絶宋文帝像宋謝琨兄弟四人像晉中興帝相像王獻之竹圖劉牢之小兒圖鸂鶒圖王僧綽像蟬雀麻紙圖鸚鵡畫扇樹相雜竹懷香畫孫公命將圖名臣圖刺虎圖小兒戲鵝圖或云是畫昭明太子王謝諸賢圖陸機詩圖並傳於代謝云神韻氣力不足前修筆精謹細則逾往烈始變古體創為今範賦彩制形皆有新意扇畫蟬雀自景秀始也宋大明中莫敢與競在第二品陸綏上彥逺按大明中有顧寶光景秀豈德獨擅也吳􅌔下品謝云體法雅媚制置才巧擅美當年有聲京洛在第二品江僧寶下張則下品謝云意態宏逸動筆新竒在吳􅌔下劉胤祖下品官至尚書吏部郎謝云蟬雀特盡微妙筆迹超越爽俊不凡在第三品晉明帝下胤祖弟紹祖下品官至晉太康太守謝云善於傳寫不間構思鳩斂卷秩近將兼兩宜有草創綜於衆本筆迹調快徑滑有餘然傷於師工乏其士體其於模寫特為精密胤祖子璞姚最云體運精研亞于胤祖在梁元帝下蔡斌下品下遊仙圖蘇武像並傳於代濮萬年下品蘇門先生圖名臣像傳於代萬年弟道興下品列女辨通圖傳於代史粲中品上馬勢白畫八駿圖傳於代宋僧辨下品褚靈石下品范惟賢諸家並不載品第唯南齊高帝集名畫曰十二人自陸至范惟賢亦未見其迹厯代名畫記卷六
