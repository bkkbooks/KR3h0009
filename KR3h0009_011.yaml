body:
  text: 厯代名畫記馬氏經籍志云名盡獵精六卷唐張彥逺纂記史皇以降至唐畫工名姓及論畫法并裝背裭軸之式鑒别閲玩之方今此書罕傳即彥逺自叙亦止云厯代名畫記而不及其名矣大略相似耳既讀兹集叙述畫之興廢自董卓帷囊而外侯景煨燃之餘其裁入江陵者又投後閣舍人之一炬能無雲烟過眼之嘆然然三百七十餘人垂不朽於天壤間即謂張氏千廂萬軸至今存可也海雲毛晉識
