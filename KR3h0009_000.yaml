body:
  text: 歷代名畫記藝術類一書畫之屬提要臣等謹案歷代名畫記十卷唐張彥逺撰嘗自稱家世藏法書名畫收藏鑒識自謂有一日之長案唐書稱彥逺祖宏靖家聚書畫侔祕府李綽尚書故實亦多記張氏書畫名迹足證自序之不誣故是書述所見聞極為賅備前三卷皆畫論一敘畫之源流二敘畫之興廢三敘自古畫人姓名四論畫六法五論畫山水樹石六論傳授南北時代七論顧陸張吳用筆八論畫體工用拓寫九論名價品第十論鑒識收藏閲玩十一序自古跋尾押署十二敘自古公私印記十三論裝禙褾軸十四記兩京外州寺觀畫壁十五論古之祕畫珍圖自第四卷以下皆畫家小傳然即第一卷內所録之三百七十人既具列其傳于後則第一卷內所出姓名一篇殊為繁復疑其書初為三卷但録畫人姓名後裒輯其事迹評論續之于後而未刪其前之姓名一篇故重出也書中徴引繁富佚文舊事往往而存如顧愷之論畫一篇魏晉勝流名畫讃一篇畫雲臺山記一篇皆他書之所不載又古書畫中禇氏書印乃别一禇氏非遂良之迹可以釋石刻靈飛經前有褚氏一印之疑亦他書之所未詳即其論杜甫詩幹惟畫肉不畫骨句亦從來注杜詩者所未引則非但鑒别之精其資考證者亦不少矣朝公武讀書志别載彥逺名畫獵精六卷記歷代畫工名姓自始皇以降至唐朝及論畫法并裝褙裱軸之式鑒别閲玩之方毛晉刻是書跋謂彥逺自序止云歷代名畫記不及此書意其大略相似考郭若虛圖畫見聞志敘諸家文字列有是書注曰無名氏撰其次序在張懷瓘畫斷之後李嗣真後畫品録之前則必非彥逺之作朝氏誤也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
