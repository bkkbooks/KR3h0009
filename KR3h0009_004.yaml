  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0009_WYG_004-1a, image: WYG0812/WYG0812-0314c.png}
body:
  text: 厯代名畫記卷四唐張彥逺撰軒轅時史皇黃帝之臣也始善圖畫創制垂法體象天地功侔造化首冠羣工不亦宜哉見世本與蒼頡同時周封膜周時人善畫見穆天子傳郭璞云姓封名膜齊敬君者善畫齊王起九重臺召敬君畫之敬君久不得歸思其妻乃畫妻對之齊王知其妻美與錢百萬納其妻劉向說苑具載秦烈裔謇㳙國人秦皇二年本國獻之口含丹墨噴壁成龍獸以指厯地如繩界之轉手方圓皆如規矩度方寸內五嶽四瀆列土備焉善畫鸞鳳軒軒然惟恐飛去見王子年拾遺録漢毛延壽杜陵人陳敞安陵人劉白新豐人龔寬洛陽人陽望下杜人樊育長安人已上六人並永光建昭中畫手時元帝後宫既多使圖其狀每披圖召見諸宫人競賂畫工錢帛獨王嬙貌麗意不苟求工人遂為醜狀及胸奴求漢美女上按圖召昭君行帝見昭君貌第一甚悔之而籍已定乃窮其事畫工皆棄市籍其家資皆巨萬毛延壽畫人老少美惡皆得其真陳敞劉白龔寬並工牛馬但人物不及延壽陽望樊育亦善畫尤善布色見葛洪西京雜記後漢趙岐字邠卿京兆長陵人多才藝善畫自為壽藏於郢城畫季札子産晏嬰叔向四人居賔位自居主位各為讃頌獻帝建安六年官至太常卿見范曄東漢書劉褒漢桓帝時人曽畫雲漢圖人見之覺熱又畫北風圖人見之覺凉官至蜀郡太守見孫暢之述畫記及張華博物志云蔡雍字伯喈裴孝源所定品第云伯喈在下品陳留圉人工書畫善鼓琴建寧中為郎中校書東觀刋正六經文字書於太學石壁天下模學又創八分書體為左中郎將封高陽鄉侯年六十一靈帝詔雍畫赤泉侯五代將相於省喜震叔節賜彪兼命為讃及書雍書畫與讃皆擅名於代時稱三美見東觀漢記并孫暢之述畫有􅊰學圖小列女圖傳於代張衡字平子南陽西鄂人高才過人性巧明天象善畫纍拜侍中出為河間王相年六十二昔建州浦城縣山有獸名駭神豕身人首狀貌醜惡百鬼惡之好出水邊石上平子往寫之獸入潭中不出或云此獸畏人畫故不出也可去紙筆獸果出平子拱手不動潛以足指畫獸今號為巴獸潭見郭氏異物志彥逺按三齊記云昔秦始皇見海神使左右巧者以足畫之又按應劭風俗通云公輸班見水上􅀢形以足盡之巧者非止於手運思腳亦應乎心也劉旦楊魯並光和中畫手待詔尚方畫於洪都學二人並見謝承後漢書魏少帝曹髦字士彥中品東海定王霦之子幼好學善書畫初封高貴鄉公後即帝位甘露三年卒年二十魏志有傳曹髦之迹獨高魏代謝赫等雖著畫品皆闕而不載彥逺今著此書不必備見其蹤跡但自古善畫者即載之有祖二疏圖盜跖圖黃河流勢新豐放雞犬圖傳於代又有於陵子黔婁夫妻圖楊修字德祖中品下華陰人也有俊才為丞相主簿與陳思王友善武帝以知有餘乂袁氏之甥也且密於植遂惡之魏志有傳西京圖嚴君平像吳季札像並晉明帝題字傳於代桓範字元則沛國龍亢人少以才學稱時號智囊善丹青在漢為羽林左監入魏拜大司農魏志有傳徐邈字景山燕國薊人性嗜酒善畫為侍中司空都鄉侯年七十六諡曰穆魏志有傳顔光祿云魏元陽之射徐侍中之畫是也魏明帝遊洛水見白獺愛之不可得邈曰獺嗜鰿魚乃不避死遂畫板作鰿魚懸岸羣獺競來一時執得帝嘉歎曰卿畫何其神也答曰臣未嘗執筆人所作者自可庶幾見續齊諧記吳曹不興中品上吳興人也孫權使畫屏風誤落筆㸃素因就成蠅狀權疑其真以手彈之時稱吳有八絶張㪍吳録云八絶者菰城鄭嫗善相劉敦善星象吳範善候風氣趙達善算嚴武善棊宋壽善占夢皇象善書曹不興善畫是八絶也吳赤烏中不興之青溪見赤龍出水上寫獻孫皓皓送祕府至宋朝陸探微見畫歎其妙因取不興龍置水上應時蓄水成霧纍日雱霈謝赫云不興之迹代不復見祕閣內一龍頭而已觀其風骨擅名不虛在第一品陸之下衛之上李嗣真云不興以一蠅輒擅重價列於上品恐為未當况拂蠅之事一說是楊修謝赫黜衛進曹是涉貴耳之論彥逺按楊修與魏太祖畫扇誤㸃成蠅遂有二事孫暢之述畫記亦云而李大夫之論不亦迂濶况不興畫名冠絶當時非止於拂蠅得名但今代無其迹若以品第在衛之上則未敢知一人白畫雜紙畫龍虎圖紙畫青溪龍赤盤龍南海監牧十種馬夷子蠻并獸龍頭四並傳於前代吳王趙夫人丞相趙達之妹善書畫巧妙無雙能於指間以綵絲織為龍鳳之錦宫中號為機絶孫權嘗歎魏蜀未平思得善畫者圖山川地形夫人乃進所寫江湖九州山嶽之勢夫人又於方帛之上繡作五嶽列國地形時人號為針絶又以膠續絲髮作輕幔號為絲絶見王子年拾遺録蜀諸葛亮字孔明彥逺按常璩華陽國志云亮以南夷之俗難化乃畫夷圖以賜夷夷甚重之亮子瞻字思逺善書畫為侍中僕射軍師將軍見蜀志厯代名畫記卷四
