body:
  text: 厯代名畫記卷七唐張彥逺撰南齊宗測字敬微炳之孫也炳已具第六卷代居江陵不應辟召驃騎將軍豫章王嶷請為參軍測答曰得何謬傷海鳥橫斤山木􅒏善書畫傳其祖業志欲遊名山乃寫祖炳所畫尚子平圖於壁隱廬山居炳舊宅畫阮籍遇孫登於行障上坐卧對之又畫永業寺佛影臺皆稱臻絶見南齊記劉係宗丹陽人少便書畫在宋為景陵王子景粹侍書入齊為東宫侍書官至驃騎將軍宣城太守南齊書具載姚曇度中品上謝云畫有逸才巧變鋒出魑魅鬼神皆為妙絶雅鄭兼善英奇俊拔天挺生知出人意表雖然洪纖循短往往有失在第三品袁倩下顧生上曇度子不知名出家法號惠覺下品姚最云丹青之用繼父之美定其優劣嵇聶之流有殷洪像白馬寺寶臺樣行於代蘧道愍下品謝云與章繼伯並善寺壁兼能畫扇人馬數分毫釐不失别體之妙可謂入神蘧始師章冰寒於水道愍外甥沙門僧珍師道愍之畫中品上姚最云嵇聶之流與惠覺同品有薑嫄等像豫章王像康居人馬傳於代章繼伯下品謝云與蘧同品藉田圖絹長三丈傳於代范懷珍中品或作懷粲或作懷堅渥窪馬圖孝子屏風行於代鍾宗之下品王攸之等像王柳等像王獻之像行於代王奴下品嘯賦圖行於代王殿下品曹長孺真列女傳母儀圖三馬圖敗舂圖傳於代戴蜀中品下孝子圖息媯圖傳於代陳公恩下品列女貞節圖列女仁智圖朱買臣圖傳於代陶景真中品下孔雀鸚鵡圖虎豹圖傳於代張季和下品遊清池圖傳於代沈標下品姚最云亡所偏善觸類涉習留意鉊華亦有可觀謝赫中品下姚最云點刷精研意存形似寫貌人物不俟對看所須一覽便歸操筆目想毫髮皆亡遺失麗服靚妝隨時變改直眉曲鬢與時競新别體細微多從赫始遂使委巷逐末皆類效顰至於氣韻精靈未窮生動之致筆路纖弱不副雅壯之懷然中興已來象人為最在沈標下毛惠秀上安期先生圖傳於代沈粲下品姚最云筆迹調媚專工綺羅屏障所圖頗有情趣在張僧繇上彥逺云專工綺羅亡所他善不合在僧繇上丁光謝云雖擅名蟬雀筆迹輕羸非不精謹乏其生氣彥逺云若以蟬雀微藝况又輕羸則猥厠畫流固有慚色周曇研沙門彥悰云師塞北勤授曹仲達比曹不足方塞有餘塞北勤未詳謝惠連中品中陳郡陽夏人幼有詞學族兄靈運歎服之官至司徒府參軍以疏放久不從宦年二十書畫並妙南齊書具載謝約下品孫暢之云綜弟也為衛尉參軍范曄為傳善山水大山圖并聲妓樂器圖傳於代虞堅下品丁寬下品劉瑱字士溫下品彭城人少聰慧多才藝工書畫飲酒至數斗畫嬪嬙當代第一官至吏部郎見南齊書謝云用意綿密畫體簡細筆力困弱制置單省婦人最佳但纖削過差翻為失真然玩之詳熟甚有姿態搗衣圖劉長史圖少年行樂圖朝臣圖吳中行舟圖並傳於代毛惠逺中品上滎陽陽武人善畫馬時劉瑱善畫婦人並當代第一官至少府卿市青碧一千二百斤供御畫用錢六十五萬有言惠逺納利者世祖勑尚書評價貴二十八萬殺之後家徒壁立上悔痛之見蕭子顯齊書謝云畫體周贍亡適不諧出意無窮縱橫絡繹位置經略尤難比儔筆力遒媚超邁絶倫其於倐忽揮霍必也極妙至於定質磈然翻未盡善鬼神及馬泥滯於時彥逺按南齊史稱惠逺畫馬第一謝乃云泥滯於時曽見酒客圖是宫卷後有題記筆迹之外頗有風格意匠師於顧酒客圖刀戟圖中朝名士圖刀戟戲圖七賢藤紙圖赭白馬圖騎馬變勢圖葉公好龍圖並傳於代惠逺弟惠秀下品下永眀中待詔祕閣世祖將北伐命惠秀畫漢武北代圖中書郎王融監掌其事融好功名秀又善圖畫成帝極珍貴置琅琊臺上每披玩焉見南齊書姚最云繪事詳悉太自矜持翻成羸鈍遒徑不及於惠逺精細有過於稜矣併除圖剡中溪谷村墟圖胡僧圖釋迦十弟子圖二疏圖傳於代惠逺子稜姚最云便速有餘真巧不足善於布置比之叔父則牀下安牀梁元帝蕭繹字世誠中品武帝第七子初生便眇一目聰慧俊朗博涉技藝天生善書畫初封湘東王後乃即位年四十七追號元帝廟號世祖嘗畫聖僧武帝親為贊之任荆州刺史日畫蕃客入朝圖帝極稱善梁書具載又畫職貢圖并序善畫外國來獻之事序具本集姚最云湘東天挺生知學窮􅒏表心師造化象人特盡神妙心敏手運不加點理聽訟之暇衆藝之餘時遇揮毫造化驚絶足使荀衛閣筆袁陸韜翰遊春苑白麻紙圖鹿圖師利像鶼鶴陂澤圖芙蓉蘸鼎圖並有題印傳於後元帝長子方等字實相尤能寫真坐上賔客隨意點染即成數人問童兒皆識之後因戰殁年二十二贈侍中中軍將軍揚州刺史諡忠莊太子見梁書及三國典略龍馬出渥窪圖蕭大連字仁靖簡文帝第五子少俊爽風流有巧思洞達音律工丹青初封臨海縣公官至東揚州刺史輕車將軍大寶元年封南郡王年二十五見梁書蕭賁字文奐下品蘭陵人多詞學工書畫曾於扇上畫山水咫尺內萬里可知仕梁為河東太守見梁書姚最云雅􅒏精密後來難比含毫命素動必依真學不為人自娛而已人間罕見其迹陸杲字明霞中品上吳郡人也好詞學信佛理工書畫與舅張融齊名初仕齊後入梁官至特進揚州大中正見梁書謝云體致不凡跨邁流俗時有合作往往出人點畫之間動雜灰琯傳於代者蓋寡陶𢎞景字通眀丹陽秣陵人幼有異操年十歲得葛洪神仙傳便有長生之志喜琴棋工草𨽻徵為諸王侍讀永眀十年辭祿遂止於句曲山自號華陽隱居好著述明衆藝善書畫大同二年卒年八十五贈中散大夫諡曰貞白先生見梁書處士傳武帝嘗欲徵用隱居畫二牛一以金籠頭牽之一則逶迤就水草梁武知其意不以官爵逼之朝廷有事多詢之號山中宰相張僧繇上品中吳中人也天監中為武陵王國侍郎直祕閣知畫事厯右軍將軍吳興太守武帝崇飾佛寺多命僧繇畫之時諸王在外武帝思之遣僧繇乘傳寫貌對之如面也江陵天皇寺明帝置內有柏堂僧繇畫廬舍那佛像及仲尼十哲帝怪問釋門內如何畫孔聖僧繇曰後當賴此耳及後周滅佛法焚天下寺塔獨以此殿有宣尼像乃不令毁拆又金陵安樂寺四白龍不點眼睛每云點睛即飛去人以為妄誕固請點之須臾雷電破壁兩龍乘雲騰去上天二龍未點眼者見在初吳曹不興圖青溪龍僧繇見而鄙之乃廣其像於武帝龍泉亭其畫草留在祕閣時未之重至太清中雷震龍泉亭遂失其壁方知神妙又畫天竺二胡僧因侯景亂散坼為二後一僧為唐右常侍陸堅所寶堅疾篤夢一胡僧告云我有同侣離坼多時今在洛陽李家若求合之當以法力助君陸以錢帛果於其處購得疾乃愈劉長卿為記述其事張畫所有靈感不可具記彥逺家有僧繇定光如來像元和中進入內曾見維摩詰并二菩薩妙極者也姚最云善圖寺壁超越羣公價等曇度朝衣野服古今不失竒形異貌殊方夷夏皆參其妙唯公及私手不釋筆俾晝作夜未嘗倦怠數紀之內亡須臾之間然聖賢曬曯猶乏神氣豈可求備於一人雖云晚出殆亞前哲在沈粲下彥逺以此評最謬李嗣真云顧陸已往鬱為冠冕盛稱後葉獨有僧繇今之學者望其塵躅如周孔焉何寺塔之云乎且顧陸人物衣冠信稱絶作未覩其餘至於張公骨氣竒偉師模宏逺豈唯六法精備實亦萬類皆妙千變萬化詭狀殊形經諸目運諸掌得之心應之手意者天降聖人為後生則何以制作之妙擬於隂陽者乎請與顧陸同居上品張懷瓘云姚最稱雖云後生殆亞前品未為知音之言且張公思若湧泉取資天造筆才一二而像已應焉周材取之今古獨立象人之妙張得其肉陸得其骨顧得其神清溪宫水怪圖吳主格虎圖維摩詰像橫泉鬬龍圖昆明二龍圖行道天王圖漢代射蛟圖雜人馬兵刀圖朱異像羊鴉仁躍馬圖摩衲仙人圖梁北郊圖梁武帝像梁宫人射雉圖定光佛像醉僧圖田舍舞圖詠梅圖並傳於代者也僧繇子善果中品或作張果李嗣真云既慚過庭之訓猶是名家之駒標置點拂殊多佳致時有合作亂真於父若長轡逺途迹不逮意一篇之中自有玉石在田楊之下鄭法輪之上悉達太子納妃圖靈嘉寺塔樣傳於代善果弟儒童中品上釋迦會圖寶積經變傳於代袁昂字千里中品上陳郡陽夏人仕齊為祕監黃門侍郎幼以孝稱頗善畫入梁官至中書監年八十贈侍中特進諡曰穆正見梁書僧悰云稟則鄭公亡所失墜綺羅一絶超彼常倫焦寶願下品姚最云早遊張謝靳固不傳傍求造請事均盜道衣制樹色皆自新意點黛施朱輕重不失在毛稜上嵇寶鈞下嵇寶鈞下品姚最云雖亡師範而意兼真俗賦彩鮮麗觀之悅情彥逺以畫􅒏所貴天然何必師範聶松下品梁帝云與嵇同品言其優劣僧繇之亞在解倩上支道林像傳於代解倩中品下姚最云全法蘧章筆力不及通變巧捷寺壁最長丁貴人彈曲項琵琶圖五天人像九子魔圖傳於代陸整中品上御像傳於代江僧寶中品下謝赫云斟酌袁陸親漸朱藍用筆骨鯁甚有師法象人外亡所長在第三品戴逵下吳􅌔上臨軒圖御像職貢圖小兒戲鵝圖並有陳朝年號傳於代光宅寺僧威公中品姚最云下筆為京洛所知僧吉底俱外國人中品僧摩羅菩提亦外國人中品僧迦佛陀中品禪師天竺人學行精慤靈感極多初在魏魏帝重之至隋隋帝於嵩山起少林寺至今房門上有畫神即是迦佛陀之迹見續髙僧傳冇菻國人物圖器物樣外國獸圖鬼神畫並傳於代姚最云已上三僧既華夷殊體亡以知其優劣彥逺按梁書外國傳云干陀利國王瞿曇備跋陀羅者亦工畫其國在南海洲上天監元年四月八日瞿曇夢一僧相告云中國今有聖主十年內佛法大興汝可朝貢不然則汝國不安夢中與僧同到中國見梁天子覺而異之記得梁主形貌命筆寫之遂遣使并本國畫工請寫髙祖真上許之使還本國陀羅以髙祖真類已畫者盛之寶亟日加禮敬以外國能畫故附此記云厯代名畫記卷七
