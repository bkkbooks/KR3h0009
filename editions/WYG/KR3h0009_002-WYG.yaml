body:
  text: 厯代名畫記卷二唐張彦逺撰叙師資傳授南北時代自古論畫者以顧生之迹天然絶倫評者不敢一二余見顧生評論魏晉畫人深自推挹衞協衞協顧愷之竝見第五卷即知衞不下於顧矣只如狸骨之方右軍歎重龍頭之畫謝赫推高名賢許可豈肯容易後之淺俗安能察之詳觀謝赫評量最為允愜姚李品藻有所未安姚最李嗣真也李駮謝云衞不合在顧之上全是不知根本良可於悒只如晉室過江王廙書畫為第一書為右軍之法畫為明帝之師晉平南將軍王廙字世將今言書畫一向吠聲但推逸少明帝而不重平南如此之類至多聊且舉其一二若不知師資傳授則未可議乎畫今粗陳大略云至如晉明帝師於王廙衞協師於曹不興顧愷之張墨荀朂師於衞協衞張同時并有畫聖之名史道碩王微師於荀朂衞協戴逵師於范宣荀衛之後范宣第一逵子㪍㪍弟顒師於父已上晉陸探微師於顧愷之探微子綏𢎞肅並師於父顧寳光袁倩師於陸倩子質師於父顧駿之師於張墨張則師於呉暕呉暕師於江僧寳劉𦙍祖師於晉明帝𦙍祖弟紹祖子璞並師於𦙍祖已上宋姚曇度子釋惠覺師於父蘧道愍師於章繼伯蘧後勝於章也道愍甥僧珍師於道愍沈標師於謝赫周曇妍師於曹仲達毛惠逺師於顧惠逺弟惠秀子稜並師於惠逺皆不及惠逺已上南齊袁昻師於謝張鄭袁尤得綺羅之玅也張僧繇子善果儒童並師於父解倩師於聶松蘧道愍道愍不及解倩焦寳願師於張謝江僧寳師於袁陸及戴江長於畫人已上梁田僧亮師於董展田楊與董展聲價相侔田楊鄭三人同時也曹仲達師於袁袁勝曹已上北齊鄭法士師於張張之高足法士弟法輪子德文並師於法士不及法士也孫尚子師於顧陸張鄭尚子鞍馬樹石幾勝於法士陳善見師於楊鄭善見寫榻楊鄭之迹不辨李雅師於張僧繇王仲舒師於孫尚子已上隋二閻師於鄭張楊展兼師於父毗毗在隋朝范長壽何長壽並師於張何劣於范尉遲乙僧師於父尉遲䟦質那在隋朝陳廷師於乙僧乙僧外國陳廷次之靳智翼師于曹曹創佛事畫佛有曹家様張家様及呉家様呉智敏師於梁寛寛勝智敏王智慎師於閻極類閻之迹而少劣檀智敏師於董呉道子師於張僧繇又師於張孝師又授筆法於張長史旭盧稜伽楊庭光李生張藏並師於吳各有所長稜伽庭光為上足劉行臣師於王韶應韓幹陳閎師於曹霸王紹宗師於殷仲容已上國朝畫人近代皆不載也各有師資逓相倣効或自開户牖或未及門墻或青出於藍或氷寒於水似類之間精粗有别只如田僧亮楊子華楊契丹鄭法士董伯仁展子䖍孫尚子閻立德閻立本並祖述顧陸僧繇田則郊野柴荆為勝楊則鞍馬人物為勝契丹則朝廷簮組為勝法士則游宴豪華為勝董則臺閣為勝展則車馬為勝孫則美人魑魅為勝閻則六法備該萬象不失所言勝者以觸類皆能而就中尤所偏勝者俗所共推展善屋木且不知董展同時齊名展之屋木不及於董李嗣真云三休輪奐董氏造其㣲六轡沃若展生居其駿而董有展之車馬展無董之臺閣此論為當若論衣服車輿土風人物年代各異南北有殊觀畫之宜在乎詳審只如呉道子畫仲由便戴木劍閻令公畫昭君已著幃帽殊不知木劍創於晉代幃㡌興於國朝舉此凡例亦畫之一病也且如幅巾傳於漢魏羃離起自齊隋幞頭始於周朝折上巾軍旅所服即今幞頭也用全幅皁向後幞髪俗謂之幞頭自武帝建德中裁為四脚也巾子創於武德朝服靴衫豈可輒施於古象衣冠組綬不宜長用於今人芒屩非塞北所宜牛車非嶺南所有詳辯古今之物商較土風之宜指事繪形可驗時代其或生長南朝不見北朝人物習熟塞北不識江南山川遊處江東不知京洛之盛此則非繪畫之病也故李嗣真評董展云地處平原闕江南之勝迹㕘戎馬乏簮裾之儀此是其所未習非其所不至如此之論便為知言譬如鄭𤣥未辯樝梨蔡謨不識螃蠏魏帝終削典論初以其無火浣布著典論言之刋於太學後有外國獻火浣布遂削弃典論也隱居有昧藥名陶隱居本草多未曉北地藥名也吾之不知蓋闕如也雖有不知豈可言其不博精通者所宜詳辯南北之妙迹古今之名蹤然後可以議乎畫論顧陸張呉用筆或問余以顧陸張呉用筆如何對曰顧愷之之迹𦂳勁聨綿循環超忽調格逸易風趨電疾意存筆先畫盡意在所以全神氣也昔張芝學崔瑗杜度草書之法因而變之以成今草書之體勢一筆而成氣脉通連隔行不斷唯王子敬明其深旨故行首之字徃徃繼其前行世上謂之一筆書其後陸探㣲亦作一筆畫連綿不斷故知書畫用筆同法陸探微精利潤媚新竒妙絶名高宋代時無等倫張僧繇㸃曵研拂依衞夫人筆陣圖一㸃一畫别是一巧鉤㦸利劍森森然又知書畫用筆同矣國朝呉道𤣥古今獨歩前不見顧陸後無來者授筆法於張旭此又知書畫用筆同矣張既號書顛呉宜為畫聖神假天造英靈不窮衆皆密於盼際我則離披其㸃畫衆皆謹於象似我則脱落其凡俗彎弧挺刃植柱構梁不假界筆直尺虬鬚雲鬢數尺飛動毛根出肉力健有餘當有口訣人莫得知數仞之畫或自臂起或從足先巨壯詭怪膚脉連結過於僧繇矣或問余曰呉生何以不用界筆直尺而能彎弧挺刃植柱構梁對曰守其神專其一合造化之功假呉生之筆向所謂意存筆先畫盡意在也凡事之臻妙者皆如是乎豈止畫也與乎庖丁發硎郢匠運斤効顰者徒勞捧心代斲者必傷其手意旨亂矣外物役焉豈能左手劃圓右手劃方乎夫用界筆直尺界筆是死畫也守其神專其一是真畫也死畫滿壁曷如汚墁真畫一劃見其生氣夫運思揮毫自以為畫則愈失於畫矣運思揮毫意不在於畫故得於畫矣不滯於手不凝於心不知然而然雖彎弧挺刃植柱構梁則界筆直尺豈得入於其間矣又問余曰夫運思精深者筆迹周密其有筆不周者謂之如何余對曰顧陸之神不可見其盻際所謂筆跡周密也張呉之妙筆纔一二像已應焉離披㸃畫時見缺落此雖筆不周而意周也若知畫有疎密二體方可議乎畫或者頷之而去論畫體工用搨寫夫陰陽陶蒸萬象錯布𤣥化亡言神工獨運草木敷榮不待丹碌之采雲雪飄颺不待鉛粉而白山不待空青而翠鳳不待五色而綷是故運墨而五色具謂之得意意在五色則物象乖矣夫畫物特忌形貎采章厯厯具足甚謹甚細而外露巧密所以不患不了而患於了既知其了亦何必了此非不了也若不識其了是真不了也夫失於自然而後神失於神而後妙失於妙而後精精之為病也而成謹細自然者為上品之上神者為上品之中妙者為上品之下精者為中品之上謹而細者為中品之中余今立此五等以包六法六法已具第一卷以貫衆妙其間詮量可有數百等孰能周盡非夫神邁識高情超心慧者豈可議乎知畫夫工欲善其事必先利其器齊紈呉練氷素霧綃精潤密緻機杼之妙也武陵水井之丹磨嵳之沙越巂之空青蔚之曾青武昌之扁青上品石綠蜀郡之鉛華黄丹也出本草始興之解錫胡粉研鍊澄汰深淺輕重精麄林邑崑崙之黄雌黄也忌胡粉同用南海之蟻􅑭紫􅑭也造粉燕脂呉綠謂之赤膠也雲中之鹿膠呉中之鰾膠東阿之牛膠采章之用也漆姑汁鍊煎並為重采鬱而用之古畫皆用漆姑汁若鍊煎謂之鬱色於綠色上重用之古畫不用頭綠大青畫家呼麄綠為頭綠麄青為大青取其精華接而用之百年傳致之膠千載不剝絶仞食竹之毫一劃如劍有好手畫人自言能畫雲氣余謂曰古人畫雲未為臻妙若能沾濕綃素㸃綴輕粉縱口吹之謂之吹雲此得天理雖曰妙解不見筆蹤故不謂之畫如山水家有潑墨亦不謂之畫不堪倣効江南地潤無塵人多精藝三呉之跡八絶之名逸少右軍長康散騎書畫之能其來尚矣淮南子云宋人善畫呉人善冶冶賦色也不亦然乎好事家宜置宣紙百幅用法蠟之以備摹寫顧愷之有摹榻妙法古時好搨畫十得七八不失神采筆蹤亦有御府搨本謂之官搨國朝内庫翰林集賢祕閣搨寫不輟承平之時此道甚行艱難之後斯事漸廢故有非常好本搨得之者所宜寳之既可希其真蹤又得留為證驗遍觀衆畫唯顧生畫古賢得其妙理對之令人終日不倦凝神遐想妙悟自然物我兩忘離形去智身固可使如槁木心固可使如死灰不亦臻於妙理哉所謂畫之道也顧生首創維摩詰像見第四卷有清羸示病之容隱几忘言之狀陸與張皆効之終不及矣張墨陸探㣲張僧繇並畫維摩詰居士終不及顧之所創者也論名價品第或曰昔張懐瓘作書估論其等級甚詳君曷不詮定自古名畫為畫估焉張子曰書畫道殊不可渾詰書即約字以言價畫則無涯以定名况漢魏三國名蹤已絶於代今人貴耳賤目罕能詳鑒若傳授不昧其物猶存則為有國有家之重寳晉之顧宋之陸梁之張首尾完全為希代之珍皆不可論價如其偶獲方寸便可椷持比之書價則顧陸可同鍾張僧繇可同逸少書則逡巡可成畫非歲月可就所以書多於畫自古而然今分為三古以定貴賤以漢魏三國為上古則趙岐劉襃蔡邕張衡已上四人後漢曹髦楊修桓範徐邈已上四人魏曹不興呉諸葛亮蜀之流是也以晉宋為中古則明帝荀朂衞協王廙顧愷之謝稚嵇康戴逵已上八人晉陸探微顧寳光袁倩顧景秀之流是也已上四人宋以齊梁北齊後魏陳後周為下古則姚曇度謝赫劉瑱毛惠逺已上四人齊元帝袁昻張僧繇江僧寳已上四人梁楊子華田僧亮劉殺鬼曹仲達已上四人北齊蔣少游楊乞德已上二人後魏顧野王陳馮提伽後周之流是也隋及國初為近代之價則董伯仁展子䖍孫尚子鄭法士楊契丹陳善見已上六人隋張孝師范長壽尉遲乙僧王知慎閻立德閻立本已上六人唐朝之流是也上古質略徒有其名畫之蹤跡不可具見中古妍質相㕘世之所重如顧陸之跡人間切要下古評量科簡稍易辯解迹渉今時之人所悦其間有中古可齊上古顧陸是也下古可齊中古僧繇子華是也近代之價可齊下古董展楊鄭是也國朝畫可齊中古則尉遲乙僧呉道𤣥閻立本是也若詮量次第有數百等今且舉俗之所知而言凡人間藏蓄必當有顧陸張呉著名卷軸方可言有圖畫若言有書籍豈可無九經三史顧陸張呉為正經楊鄭董展為三史其諸雜迹為百家呉雖近可為正經必也手揣卷軸口定貴賤不惜泉貨要藏篋笥則董伯仁展子䖍鄭法士楊子華孫尚子閻立本呉道𤣥屏風一片值金二萬次者售一萬五千自隋已前多畫屏風未知有畫幛故以屏風為准也其楊契丹田僧亮鄭法輪乙僧閻立德一扇值金一萬且舉俗間諳悉者推此而言可見流品夫中品藝人有合作之時可齊上品藝人上品藝人當未遒之日偶落中品唯下品雖有合作不得厠於上品在通博之人臨時鑒其妍醜只如張顛以善草得名楷𨽻未必為人所寳余曽見小楷樂毅虞褚之流韋鶠以畫馬得名人物未必為人所貴余見畫人物顧陸可儔夫大畫與細畫用筆有殊臻其妙者乃有數體只如王右軍書乃自有數體及諸行草各繇臨時構思淺深耳畫之臻妙亦猶於書此須廣見博論不可匆匆一槩而取昔裴孝源都不知畫妄定品第大不足觀但好之則貴於金玉不好則賤於瓦礫要之在人豈可言價論鑒識收藏購求閲玩夫識書人多識畫自古蓄聚寳玩之家固亦多矣已具第一卷中則有收藏而未能鑒識鑒識而不善閲玩者閲玩而不能裝褫裝褫而殊亡銓次者此皆好事者之病也貞觀開元之代自古盛時天子神聖而多才士人精博而好蓺購求至寳歸之如雲故内府圖書謂之大備國初左僕射蕭瑀及許善心楊素褚安福家並進圖畫兼隋代所有乃成林藪貞觀六年虞世南褚遂良等奉勅簡閲開元十年十二月大子中允張悱充知搜訪書畫使天寳中徐浩充採訪圖畫使前後不可具載名代也或有進獻以獲官爵或有搜訪以獲錫賚開元中有商胡穆聿别識圖書遂直集賢告訐搜求至德中白身受金吾長史改名詳時有潘淑善以獻書畫拜官遼東人王昌括州人葉豐長安人田穎洛陽人杜福劉翌河内人齊光皆别識販賣此軰雖業隣好事而迹類藩身又有侍御史集賢直學士史維則充使博訪圖書懸以爵賞所獲不少建中四年徐浩侍郎自云昬耄奏男璹前試國子司業兼太原縣令竇蒙蒙弟檢校户部員外郎汴宋節度㕘謀泉並皆别識􅃯並用之貞元初有賣書畫人孫方顒與余家買得真迹不少今有男盈在長安頃年又有趙晏皆為别識也又有從來蓄聚之家自號圖書之府開元中邠王府司馬竇瓉潁川人也右補闕席異安定人也監察御史潘履慎滎陽人也金部郎中蔡希寂濟陽人也給事中竇紹歙州婺源縣令滕昇呉郡人也陸曜東都人福先寺僧朏同官尉高至渤海人也國子主簿晁温太原人也鄠縣尉崔曼倩永王府長史陳閎潁川人也監察御史薛邕太原人郭暉並是别識收藏之人近則張郎中從申侍郎惟素從申子也蕭桂州祐李方古歸侍郎登道士盧元卿韓侍郎愈裴侍郎璘段相鄒平公中書令晉公裴度李太尉德裕蓄聚既多必有佳者妍蚩渾雜亦在詮量是故非其人雖近代亦朽蠧得其地則逺古亦完全其有晉宋名跡煥然如新已厯數百年紙素彩色未甚敗何故開元天寳間蹤跡或已耗散良由寳之不得其地也夫金出於山珠産於泉取之不已為天下用圖畫歲月既久耗散將盡名人蓺士不復更生可不惜哉夫人不善寳玩者動見勞辱卷舒失所者操揉便損不解裝褫者隨手棄捐遂使真迹漸少不亦痛哉非好事者不可妄傳書畫近火燭不可觀書畫向風日正飡飲唾涕不洗手並不可觀書畫昔桓𤣥愛重圖書毎示賔客客有非好事者正飡寒具按寒具即今之環餅以酥油煮之遂汚物也以手捉書畫大㸃汚𤣥惋惜移時自後每出法書輒令洗手人家要置一平安牀褥拂拭舒展觀之大卷軸宜造一架觀則懸之凡書畫時時舒展即免蠧濕余自弱年鳩集遺失鑒玩裝理晝夜精勤每獲一卷遇一幅必孜孜葺綴竟日寳玩可致者必貨弊衣减糲食妻子僮僕切切嗤咲或曰終日為無益之事竟何補哉既而歎曰若復不為無益之事則安能悦有涯之生是以愛好愈篤近於成癖每清晨閒景竹窗松軒以千乘為輕以一瓢為倦身外之累且無長物唯書與畫猶未忘情既頹然以忘言又怡然以觀閲常恨不得竊觀御府之名迹以資書畫之廣博又好事家難以假借况少真本書則不得筆法不能結字已墜家聲為終身之痛畫又迹不逮意但以自娯與夫熬熬汲汲名利交戰於胸中不亦猶賢乎昔陶隱居啓梁武帝曰愚固博渉患未能精苦恨無書願作主書令史晩愛楷𨽻又羡典掌之人人生數紀之内識解不能周流天壤區區惟恣五慾實可愧耻每以得作才鬼猶勝頑仙此陶隱居之志也由是書畫皆為清玅况余凡鄙於二道能無癖好哉今彦逺又别撰集法書要錄等共為二十卷好事者得余二書則書畫之事畢矣厯代名畫記卷二
