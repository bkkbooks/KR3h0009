body:
  text: 厯代名畫記卷八唐張彦逺撰陳顧野王字希馮吳郡人七嵗通五經善屬詞能書畫長為鴻儒天象地理無不畢習在梁為中領軍時宣城王為揚州野王善畫王褒善書俱為賔友時號二絶入陳官至黄門侍郎年六十三贈右衛將軍見陳書後魏蔣少遊樂安博昌人敏慧機巧工書畫善畫人物及雕刻雖有才學常在剞劂繩墨之間園湖城殿之側識者歎息少遊坦然以為己任不告疲勞官至將作大匠太常少卿前將軍都水兼此四官贈龍驤將軍青州刺史諡曰質見後魏書時有郭善明侯文和柳儉閔文和郭道興並以巧思稱彦逺以徳成而上藝成而下鄙亡徳而有藝也君子依仁游藝周公多才多藝貴徳藝兼也苟亡徳而有藝雖執厮役之勞又何興歎乎楊乞徳封新鄉侯歸心釋門施身入寺善畫佛像價凌曇度王由字茂道善書畫摹畫佛像為時所服官至東萊太守見後魏書祖班者東魏人善畫見三國典畧北齊髙孝珩世宗第二子封廣寧郡王尚書令大司徒司州牧博渉多才藝嘗於㕔事壁上畫蒼鷹覩者疑其真鳩雀不敢近又畫朝士圖當時絶妙為周師所虜授開封縣侯孝珩亦善音律周武宴齊君臣自彈琵琶命孝珩吹笛見北齊書蕭放字希逸梁武帝猶子也為本朝著作郎入齊待詔詞林館善丹青因於宫中監諸畫工帝令采古来麗美詩及賢哲充畫圖帝甚善之與楊休之同撰御覽加鎮東大將軍散騎常侍見北齊書楊子華中品上世祖時任直閣將軍員外散騎常侍嘗畫馬於壁夜聴蹄齧長鳴如索水草圖龍於素舒卷輒雲氣縈集世祖重之使居禁中天下號為畫聖非有詔不得與外人畫時有王子沖善棋通神號為二絶見北齊史閻立本云自像人以来曲盡其妙簡易標美多不可减少不可踰其唯子華乎僧悰云在孫下田上李云在上品張下鄭上斛律金像北齊貴戚游苑圖宫苑人物屏風鄴中百戲獅猛圖並傳於代田僧亮下品官至三公中郎將入周為常侍當時之名髙於董展僧悰云挺特生知不由師授田家一種古今獨絶在楊子華下竇蒙云非獨田家衆藝皆妙楊孫之次董展其流彦逺以僧亮畫意類於展而不如展之精宻也李云田楊聲實與董展相侔備通形似田氏野服紫車名為絶筆與楊契丹同在上品董展之下劉殺鬼下品與楊子華同時世祖俱重之畫鬭雀於壁間帝見之為生拂之方覺常在禁中錫賚鉅萬任梁州刺史見北濟書詞苑傳曹仲達本曹國人也北齊最稱工能畫梵像官至朝散大夫國朝宣律師撰三寶感通記具載仲達畫佛之妙頗有靈感僧悰云曹師於袁氷寒於水外國佛像亡兢於時盧思道斛律明月慕容紹宗䓁像弋獵圖齊武臨軒對武騎名馬圖傳於代殷英童善畫兼楷𨽻髙尚士中品徐徳祖下品曹仲璞已上三人並是當時名手後周馮提伽北平人也官至散騎常侍兼禮部侍郎志尚清逺後避周末之亂傭畫於幷汾之間竇蒙云寺壁皆有合作風格精密動若神契彦逺按提伽之迹未甚精密山川草樹宛然塞北車馬為得意人物非所長隋閶毗榆林盛樂人工篆𨽻善丹青當時號為臻絶周武帝時拜儀同三司隋帝愛其才藝令侍東宫數以雕麗之物取悦於皇太子拜東騎將隋煬帝令毗修輦輅多所損益與宇文愷參詳故實並推巧思官至朝散大夫將作少監見隋書時有何稠宇桂林劉龍龍弟衮並有巧思絶世過人展子䖍中品下厯北齊周隋在隋為朝散太夫帳内都督僧悰云觸物留情備皆妙絶尤喜臺閤人馬山川咫尺千里李云董展同品董有展之車馬展有董之臺閤法華變白麻紙長安車馬人物圖弋獵圖雜宫苑南郊白畫王世充像北齊後主幸晋陽圖朱買臣覆水圖並傳於代鄭法士中品上在周為大都督左員外侍郎建中將軍封長社縣子入隋授中散大夫僧悰云取法張公備該萬物後來冠冕獲擅名家在孫尚子上李云伏道張門謂之高足鄰幾覩奥具體而㣲氣韻標舉風格遒俊麗組長纓得威儀之樽節柔姿綽態盡幽閒之雅容至乃百年時景南鄰北里之娱十月車徒流水浮雲之勢則金張意氣玉石豪華飛觀層樓間以喬林嘉樹碧潭素瀨糅以雜英芳草必曖曖然有春臺之思此其絶倫也江左自僧繇已降鄭君自稱獨歩在上品楊子華下孫尚子上按鄭法輪鄭徳文袁昂陳善見劉烏閻立本皆師鄭公各有形似識者方辨之禽盧明月像阿育王像陳𤣥英像貴戚屏風洛中人物車馬隋文帝入佛堂像北齊畋遊像楊素賀若弼像并遊春苑圖並傳於代彦逺以李大夫所評鄭在楊下此非允當鄭合在楊上法士弟法輪中品上李云屬意温雅用筆調潤精密有餘髙竒未足輿馬之際難與比肩比其兄為劣及其闢臺苑恣登臨羅綺如春芳菲似雪亦為絶塵也僧悰云法輪精密有餘不近師匠全範士體先圖寺壁本效張公為歩不成諒非髙雅前賢品第以此失之法士子徳文中品李云筆迹纎懦英靈銷歇與法輪劉烏同孫尚子上品中睦州建徳縣尉僧悰云師模顧陸骨氣有餘鬼神特所偏善婦人亦有風態在法士下子華上竇蒙云鞍馬樹石法士不如與顧陸異迹豈獨鬼神而已李云孫鄭共師於張鄭則人物樓臺當雄霸伯孫則魑魅魍魎參靈酌妙善為戰筆之體甚有氣力衣服手足木葉川流莫不戰動唯鬚髪獨爾調利他人效之終莫能得此其異態也在上品鄭下董展上美人圖屋宇鬼神傳於代董伯仁中品上汝南人也多才藝鄉里號為智海官至光禄大夫殿中將軍僧悰云綜歩多端尤精位置屛障一種亡愧前賢在陳善見下竇蒙云樓臺人物曠絶今古雜畫巧贍髙視孫田乃變化萬殊何止屏風一種李云董與展皆天王縱任亡所祖述動筆形似畫外有情足使先輩名流動容變色但地處平原闕江山之助跡參戎馬少簮裾之儀此是所未習非其所不至若較其優劣則欣戚笑言皆窮生動之意馳驅弋獵各有奔飛之狀必也三休輪奐董氏造其微六轡沃若展生居其駿董有展之車馬展亡董之臺閣汝南今多畫迹是其絶思石泉公王方慶觀之而歎曰向使展董二人與江東諸子易地而處張侯已降咸應病之鑒者以為知言初董與展同召入隋室一自河北一自江南初則見輕後乃頗采其意古來詞人亦有此累周明帝畋遊圖雜畫臺閣樣彌勒變𢎞農田家圖隋文帝上廏名馬圖傳於代楊契丹上品中官至上儀同僧悰云六法備該甚有骨氣山東體制允屬伊人在閻立本下竇云契丹之迹非不雄富比之董展則乏精㣲李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺畫小塔鄭圖東壁北壁田圖西壁南壁楊畫外邉四面是稱三絶楊以簟蔽畫處鄭竊觀之謂楊曰卿畫終不可學何勞鄣蔽楊特託以婚姻有對門之好又求楊畫本楊引鄭至朝堂指宮闕衣冠車馬曰此是吾畫本也由是鄭深歎服光明寺後為大雲寺今長安懐逺里也又寳刹寺一壁佛湼槃變維摩等亦為妙作與田同品隋朝正㑹圖幸洛陽圖豆盧寜像貴戚游宴圖雜佛變傳於代劉烏下品僧悰云師於鄭屏鄣有功其於綿宻獨越倫輩李云學於鄭不少風格但未遒耳陳善見下品僧悰云准的於鄭遒媚温潤則不及之裴孝源云二閻袁陸張之外學者陳善見王知愼之流萬得其一固未及於風格尚汲汲於形似今之所蓄皆善見寫榻都非楊鄭之眞矣江志中品僧悰云筆力勁健風韻頓挫模山擬石妙得其眞李雅下品為滕王庫直或云秦王僧悰云神氣抑揚獨越倫伍聖僧形制是所尤工竇云佛像鬼神法士以下僧繇之亞契丹善見未可比之王仲舒下品僧悰云北面孫公風骨不逮精熟潤媚推於名輩閻思光下品解悰下品程瓉下品已上三人竝隋朝名手尉遲跋質那西國人善畫外國及佛像當時擅名今謂之大尉遲六番圖外國寳樹圖又有婆羅門圖傳於代天竺僧曇摩拙义亦善畫隋文帝時自本國來遍禮中夏阿育王塔至成都雒縣大石寺空中見十二神形便一一貌之乃刻木為十二神形於寺塔下至今在焉具三寳感通記厯代名畫記卷八
