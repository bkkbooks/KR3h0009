body:
  text: 厯代名畫記卷一唐張彦逺撰叙畫之源流夫畫者成教化助人倫窮神變測幽微與六籍同功四時並運發於天然非繇述作古先聖王受命應籙則有龜字効靈龍圖呈寳自巢燧以來皆有此瑞迹映乎瑶牒事傳乎金冊庖犧氏發於滎河中典籍圖畫萌矣軒轅氏得於温洛中史皇蒼頡狀焉奎有芒角下主辭章頡有四目仰觀埀象因儷鳥龜之跡遂定書字之形造化不能藏其秘故天雨粟靈怪不能遁其形故鬼夜哭是時也書畫同體而未分象制肇創而猶略無以傳其意故有書無以見其形故有畫天地聖人之意也按字學之部其體有六一古文二竒字三篆書四佐書五繆篆六鳥書在幡信上書端象鳥頭者則畫之流也漢末大司空甄豐挍字體有六書古文即孔子壁中書竒字即古文之異者篆書即小篆也佐書秦𨽻書也繆篆所以摹印璽也鳥書即幡信上作蟲鳥形狀也顔光祿云圖載之意有三一曰圖理卦象是也二曰圖識字學是也三曰圖形繪畫是也又周官教國子以六書其三曰象形則畫之意也是故知書畫異名而同體也周禮保章氏掌六書指事鍇聲象形會意轉注假借皆蒼顔之遺法也洎乎有虞作繪繪畫明焉既就彰施仍深比象於是禮樂大闡教化繇興故能揖讓而天下治煥乎而詞章備廣雅云畫類也爾雅云畫形也説文云畫畛也象田畛畔所以畫也釋名云畫挂也以彩色挂物象也故鼎鐘刻則識魑魅而知神姦旂章明則昭軌度而備國制清廟肅而罇彞陳廣輪度而疆理辨以忠以孝盡在於雲臺有烈有勲皆登於麟閣見善足以戒惡見惡足以思賢留乎形容式昭盛德之事具其成敗以傳既徃之蹤記傳所以叙其事不能載其容賦頌有以詠其美不能備其象圖畫之制所以兼之也故陸士衡云丹青之興比雅頌之述作美大業之馨香宣物莫大於言存形莫善於畫此之謂也善哉曹植有言曰觀畫者見三皇五帝莫不仰戴見三季異主莫不悲惋見簒臣賊嗣莫不切齒見高節妙士莫不忘食見忠臣死難莫不抗節見放臣逐子莫不歎息見婬夫妒婦莫不側目見令妃順后莫不嘉貴是知存乎鑒戒者圖畫也昔夏之衰也桀為暴亂太史終抱畫以奔商殷之亡也紂為淫虐内史摯載圖而歸周燕丹請獻秦皇不疑蕭何先收沛公乃王圖畫者有國之鴻寳理亂之紀綱是以漢明宫殿贊兹粉繪之功蜀郡學堂義存勸戒之道馬后女子尚願戴君於唐堯石勒羯胡猶觀自古之忠孝豈同博奕用心自是名教樂事余嘗恨王充之不知言云人觀圖畫上所畫古人也視畫古人如視死人見其面而不若觀其言行古賢之道竹帛之所載燦然矣豈徒墻壁之畫哉余以此等之論與夫大笑其道詬病其儒以食與耳對牛鼔簧又何異哉叙畫之興廢圖畫之妙爰自秦漢可得而記降于魏晉代不乏賢洎乎南北哲匠間出曹衛顧陸擅重價於前董展孫楊垂妙迹于後張鄭兩家高歩於隋室大安兄弟首冠於皇朝此蓋尤所烜赫也世俗知尚者其餘英妙今亦殫論漢武創置秘閣以聚圖書漢明雅好丹青别開畫室又創立鴻都學以集竒藝天下之藝雲集及董卓之亂山陽西遷圖畫縑帛軍人皆取為帷囊所收而西七十餘乘遇雨道艱半皆遺弃魏晉之代固多藏蓄胡寇入洛一時焚燒宋齊梁陳之君雅有好尚晉遭劉曜多所毁散重以桓𤣥性貪好竒天下法書名畫必使歸已及𤣥簒逆晉府真迹𤣥盡得之何法盛晉中興書云劉牢之遣子敬宣詣𤣥請降𤣥大喜陳書畫共觀之𤣥敗宋高祖先使臧喜入宫載焉南齊高帝科其尤精者錄古來名手不以逺近為次但以優劣為差自陸探微至范惟賢四十二人為四十二等二十七秩三百四十八卷聽政之餘旦夕披玩梁武帝尤加寳異仍更搜葺元帝雅有才藝自善丹青古之珍竒充物内府侯景之亂太子綱數夢秦皇更欲焚天下書既而内府圖畫數百函果為景所焚也及景之平所有畫皆載入江陵為西魏將于謹所陷元帝將降乃聚名畫法書及典籍二十四萬卷遣後閤舍人高善寳焚之帝欲投火俱焚宫嬪牽衣得免呉越寳劍並將斫柱令折乃歎曰蕭世誠遂至于此儒雅之道今夜窮矣于謹等於煨燼之中收其書畫四千餘軸歸于長安故顔之推觀我生賦云人民百萬而囚虜書史千兩而煙颺史籍已來未之有也溥天之下斯文盡喪陳天嘉中陳主肆意搜求所得不少及隋平陳命元帥記室㕘軍裴矩高熲收之得八百餘卷隋帝於東京觀文殿後起二臺東曰妙楷臺藏自古法書西曰寳蹟臺收自古名畫煬帝東幸揚州盡將隨駕中道船覆大半淪弃煬帝崩並歸宇文化及化及至聊城為竇建德所取留東都者為王世充所取聖唐武德五年尅平僣逆擒二偽主兩都秘藏之迹維揚扈從之珍歸我國家焉乃命司農少卿宋遵貴載之以船泝河西上將至京師行經砥柱忽遭漂沒所存十亡一二國初内庫只有三百卷並隋朝以前相承御府所寳太宗皇帝特所耽玩更於人間購求天后朝張易之奏召天下畫工修内庫圖畫因使工人各推所長鋭意模冩仍舊裝背一毫不差其真者多歸易之易之誅後為薛少保稷所得薛殁後為岐王範所得𤣥宗弟諡惠文太子王初不陳奏後懼乃焚之時薛少保與岐王範石泉公王方慶家所蓄圖畫皆歸於天府祿山之亂耗散頗多肅宗不甚保持頒之貴戚貴戚不好鬻於不肖之手物有所歸聚于好事之家及德宗艱難之後又經散失甚可痛也自古兵火亟焚江波屢鬬年代寖逺失墜彌多儻時君之不尚則闕其搜訪非至人之賞玩則未辨妍蚩所以駿骨不來死鼠為璞嗟乎今之人衆蓺鮮至此道尤衰未曽誤㸃為蠅惟見不成類狗彦逺家代好尚高祖河東公曾祖魏國公相繼鳩集名迹先是魏國公與司徒汧公李勉並佐霍國公闗内三軍幕府王思禮霍公平定兩京魏公之䇿也魏公與汧公因其同寮遂成久要並列藩閫齊居台衡雅會襟靈琴書相得汧公博古多蓺窮精蓄竒魏晉名蹤盈於篋笥許詢逸少經年共賞山泉謝傅戴逵終日惟論琴畫汧公任南海日於羅浮山得片石汧公子兵部員外郎約又於潤州海門山得雙峰石並為好事所寳悉見傳授又汧公手斲雅琴尤佳者曰響泉曰韻罄汧公在􅉸州魏公在西川金王之音山川亡間盡緘瑤匣以表嘉貺西川幕客司空曙賦曰白雪高吟際青霄逺望中誰言路遐曠宫徵暗相通時汧公并寄重寳琴解及琴薦咸在焉大父高平公與愛弟主客員外郎彦逺叔祖名諗及汧公愛子纘祠部郎中纘弟約兵部員外郎字存博更叙通舊遂契忘言逺同莊惠之交近得荀陳之會大門請纘為判官約與主客皆高謝榮宦琴尊自樂終日陶然士流企望莫及也繇是萬卷之書盡歸王粲一厨之畫恒寄桓𤣥李兵部又於江南得蕭子雲壁書飛白蕭字匣之以歸洛陽授余叔祖致之修善里構一亭號曰蕭亝王涯相倚權勢員之而趨太和末為亂兵所壞其蕭字本末具余所撰法書要錄中元和十三年高平公鎮太原不能承奉中貴為監軍使内官魏𢎞簡所忌無以指其瑕且驟言於憲宗曰張氏富有書畫遂降宸翰索其所珍惶駭不敢緘藏科簡登時進獻乃以鍾張衞索真迹各一卷二王真迹各五卷魏晉宋齊梁陳隋雜迹各一卷顧陸張鄭田楊董展洎國朝名手畫合三十卷表上曰伏以前代帝王多求遺逸朝觀夕覽收鑒於斯陛下睿聖欽明凝情好古聽政之暇將以怡神前件書畫厯代共寳是稱珍絶其陸探微蕭史圖妙冠一時名居上品所希睿鑒别賜省覽又别進𤣥宗馬射真圖永寳府司馬陳閎畫表曰𤣥宗天縱神武蓺冠前王凡所游畋必存繪事豈止雲夢殪兕楚人美旌盖之雄潯陽射蛟漢史稱舳艫之盛前件圖臣瞻奉先靈素所寳惜陛下旁求珍迹以備石渠祖宗之美敢不獻呈掌書記監察御史李徳裕制詞手詔荅曰卿慶傳台鉉業嗣弓裘雄詞冠於一時奥學窮乎千古圖書兼蓄精博兩全别進𤣥宗馬射真圖恭獲披捧瞻拜感咽聖靈如臨其鍾張等書顧陸等畫古今共寳有國所珍朕以視朝之餘得以寓目因知丹青之妙有合造化之功欲觀象以省躬豈好竒而玩物况煩章奏嘉歎良深其書畫並收入内庫世不復見其餘者長慶初大父為内貴魏𢎞簡門人宰相元稹所擠出鎮幽州遇朱克融之亂皆失墜矣非戎虜所愛及事定頗有好事購得之彦逺時未齔歲恨不見家内所寳其進奉之外失墜之餘存者纔二三軸而已雖有豪勢莫能求旃嗟爾後來尤須靳固宜抱漆書而興歎莫將棐柿以藩身聊因瑕日編為此記且撮諸評品用明乎所業亦探於史傳以廣其所知後漢孫暢之有述畫記梁武帝陳姚最謝赫隋沙門彦悰唐御史大夫李嗣真秘書正字劉整著作郎顧况並兼有畫評中書舍人裴孝源有畫錄竇蒙有畫拾遺錄率皆淺薄漏畧不越數紙僧悰之評最為謬誤傳寫又復脱錯殊不足看也如宋朝謝希逸陳朝顧野王之流當時能畫評品不載詳之近古遺脱至多蓋是世上未見其蹤又述作之人不廣求耳嗚呼自古忠孝義烈湮没不稱者曷勝記哉况書畫耶聖唐至今二百三十年竒蓺者駢羅耳目相接開元天寳其人最多何必六法俱全六法解在下篇但取一技可採謂或人物或屋宇或山水或鞍馬或鬼神或花鳥各有所長自史皇至今大唐會昌元年凡三百七十餘人編次無差銓量頗定此外旁求錯綜心目所鑒言之無隱將來者有能撰述其或繼之時大中元年歲在丁卯叙厯代能畫人名自軒轅至唐㑹昌凡三百七十人軒轅時一人史皇周一人封膜齊一人敬君秦一人烈裔前漢六人毛延壽陳敞劉白龔寛陽望樊育後漢六人趙岐劉襃蔡邕張衡劉旦楊魯魏四人曹髦楊脩桓範徐邈呉二人曹不興呉王趙夫人蜀二人諸葛亮亮子瞻晉二十三人明帝荀朂張墨衞協王廙王羲之子獻之康昕顧愷之史道碩謝稚夏侯瞻嵇康温嶠謝巖曹龍丁逺楊惠江思逺王濛戴逵逵子㪍㪍弟顒宋二十八人陸探微探微子綏綏弟𢎞肅顧寳光宗炳王微謝莊袁倩倩子質史敬文史藝劉斌尹長生顧駿之康允之顧景秀呉暕張則劉𦙍祖弟紹祖子璞蔡斌濮萬年弟道興史粲朱僧辯禇靈石范惟賢南齊二十八人宗測劉係宗姚曇度子釋惠覺蘧道愍甥沙門僧珍章繼伯范懐珍鍾宗之王奴王殿戴蜀陳公㤙陶景真張季和沈標謝赫沈粲丁光周曇研謝惠連謝約虞堅丁寛劉瑱毛惠逺弟惠秀子稜梁二十人元帝子方等蕭大連蕭賁陸杲陶𢎞景張僧繇子善果善果弟儒童袁昻焦寳願嵇寳鈞聶松解倩陸整江僧寳僧威公僧吉底俱僧摩羅菩提僧迦佛佗陳一人顧野王後魏九人蔣少遊郭善明侯文和栁儉閔文和郭道興楊乞德王由祖班北齊十人高孝珩蕭放楊子華田僧亮劉殺鬼曹仲達殷英童高尚士徐德祖曹仲璞後周一人馮提伽隋二十一人閻毗何稠劉龍龍弟衮展子䖍鄭法士弟法輪子德文孫尚子董伯仁楊契丹劉烏陳善見江志李雅王仲舒閻思光解悰程瓚尉遲䟦質那僧曇摩拙义唐二百六人漢王元昌弟韓王元嘉滕王元嬰閻立德弟立本張孝師范長壽何長壽尉遲乙僧劉孝思靳智翼王定梁寛呉智敏康薩陀王知慎王韶應檀智敏楊須䟦趙武端范龍樹周烏孫楊德紹陳義殷􅀈殷季友許琨僧法明錢國養左文通王陀子牛昭呉道子張愛兒楊惠之員明程進韓伯通竇𢎞果毛婆羅孫仁貴金忠義翟琰李生張藏楊庭光慮稜伽姚景仙武靜藏董㟧陳靜心弟靜眼程雅楊坦楊仙喬解倩馮紹正姜皎李思訓弟思誨思誨子林甫林甫弟昭道林甫姪凑薛稷郎餘令曹元廓劉行臣暢􅈯子明瑾楊寧楊昇張萱尹琳李仲昌李嗣真韋無忝弟無縱朱抱一竺元標蔡金剛毛嵩姚彦山程遜董好子楊樹兒耿純任貞亮陸庭曜暢整李相國陳慤劉智敏史晟何君墨京元成崔霞冷元琇馬光業李蠻子馬樹鷹祝丘潘細衣周子敬段去惑僧智瑰殷令名殷聞禮子仲容談皎僧金剛三藏張遵禮王紹宗宋令文司馬承禎盧鴻釋翛然鄭䖍鄭逾曹霸李果奴果奴孫士昉韓幹孔榮陳閎孟仲暉杜景祥王允之王維張諲劉方平王熊王象田琦竇師綸江都王緒李逖李平鈞崔陽元李炅張維亘李滔張通耿昌言弟昌期周古言嚴杲楊德本具俊李韶魏晉孫蒯亷白旻韓嶷子文蕭陳庭高江車道政滕王湛然齊皎皎弟映朱審王宰畢宏楊炎史瓚裴諝韋鑒弟鑾子鶠張璪陳曇顧况沈寧劉商劉整劉之竒邊鸞于錫强潁梁廣陳庶陳恪恪子積善戴重席劉之章周昉趙博文兄博宣王胐鄭寓韓滉戴嵩嵩弟嶧李漸子仲和蕭祐周太素麴庭蕭悦張志和侯莫陳厦僧道芬鄭町梁洽項容呉恬王黙論畫六法昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨類賦彩五曰經營位置六曰傳模移寫自古畫人罕能兼之彦逺試論之曰古之畫或遺其形似而尚其骨氣以形似之外求其畫此難與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似在其間矣上古之畫迹簡意澹而雅正顧陸之流是也中古之畫細密精緻而臻麗展鄭之流是也近代之畫煥爛而求備今人之畫錯亂而無旨衆工之迹是也夫象物必在於形似形似須全其骨氣骨氣形似皆本於立意而歸乎用筆故工畫者多善書然則古之嬪擘纎而胸束古之馬喙尖而腹細古之臺閣竦峙古之服飾容曵故古畫非獨變態有竒意也抑亦物象殊也至於臺閣樹石車輿器物無生動之可擬無氣韻之可侔直要位置向背而已顧愷之曰畫人最難次山水次狗馬其臺閣一定器耳差易為也斯言得之至於鬼神人物有生動之可狀須神韻而後全若氣韻不周空陳形似筆力未遒空善賦彩謂非妙也故韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃譎怪之狀斯言得之至於經營位置則畫之總要自顧陸以降畫迹鮮存難悉詳之唯觀呉道𤣥之迹可謂六法俱全萬象畢盡神人假手窮極造化也所以氣韻雄狀幾不容於縑素筆迹磊落遂恣意於牆壁其細畫又甚稠密此神異也至於傳模移寫乃畫家末事然今之畫人粗善寫貎得其形似則無其氣韻具其彩色則失其筆法豈曰畫也嗚呼今之人斯藝不至也宋朝顧駿之常結構高樓以為畫所每登樓去梯家人罕見若時景融朗然後含毫天地陰慘則不操筆今之畫人筆墨混於塵埃丹青和其泥滓徒汙絹素豈曰繪畫自古善畫者莫匪衣冠貴胄逸士高人振玅一時傳芳千祀非閭閻鄙賤之所能為也論畫山水樹石魏晉以降名迹在人間者皆見之矣其畫山水則羣峰之勢若鈿飾犀櫛或水不容泛或人大於山率皆附以樹石映帶其地列植之狀則若伸臂布指詳古人之意專在顯其所長而不守於俗變也國初二閻擅美匠學楊展精意宫觀漸變所附尚猶狀石則務於雕透如氷澌斧刃繪樹則刷脉鏤葉多栖梧菀柳功倍愈拙不勝其色呉道𤣥者天付勁毫幼抱神奥徃徃於佛寺畫壁縱以怪石崩灘若可捫酌又於蜀道寫貎山水由是山水之變始於呉成於二李李將軍李中書樹石之狀玅於韋鶠窮於張通張璪也通能用紫毫秃鋒以掌摸色中遺巧飾外若混成又若王右丞之重深楊僕射之竒贍朱審之濃秀王宰之巧密劉商之取象其餘作者非一皆不過之近代有侯莫陳厦沙門道芬精緻稠沓皆一時之秀也呉興郡南堂有兩壁樹石余觀之而歎曰此畫位置若道芬迹類宗偃是何人哉吏對曰有徐表仁者初為僧號宗偃師道芬則入室今寓於郡側年未衰而筆力奮疾召而來徵他筆皆不類遂指其單複曲折之勢耳剽心晤成若宿構使其凝意且啓幽襟迨乎構成亦竊竒狀向之兩壁蓋得意深竒之作觀其濳蓄嵐瀬遮藏洞泉蛟根束鱗危幹凌碧重質委地青飇滿堂呉興茶山水石奔異境與性會乃召於山中寫明月峽因叙其所見庻為知言知之者解頤不知者拊掌厯代名畫記卷一
