body:
  text: 厯代名畫記卷三唐張彦逺撰叙自古跋尾押署前代御府自晉宋至周隋收聚圖畫皆未行印記但備列當時鑒識蓺人押署宋張則袁倩陸綏齊劉瑱毛惠逺梁沈熾文唐懐允徐僧權孫子真庾於陵法象徐湯孫達姚懐珍范𦙍祖江僧寶滿騫陳延祖顧操陳杜僧譚黃髙北齊丁道矜隋江總姚察朱异何妥大業年月日奉勅裝開皇年月日内史薛道衡署名跋尾亦有開皇年月日㕘軍事學士諸葛頴諮議㕘軍開府學士桞顧言釋智果唐朝武徳初秦王府跋尾主簿上開府薛收文學褚亮亦有褚亮下更署虞世南姓名貞觀中褚河南等監掌裝背並有當時鑒識人押署跋尾官爵姓名貞觀十一年月日兵曹史樊行整裝合若干紙宣義郎行㕘軍李徳穎數功曹㕘軍金川縣開國男平儼典司馬行相州都督府司馬蘇朂監銀青光祿大夫行黃門侍郎扶風縣開國男韋挺監十二年月日題署同十一年十三年月日將仕郎直𢎞文館臣王行直裝起居郎臣褚遂良監司空許州都督趙國公臣無忌開府儀同三司尚書左僕射太子少師梁國公臣𤣥齡特進尚書左僕射申國公臣士亷特進鄭國公臣徴吏部尚書左僕射臣君集犯法後亦有楷却處中書令駙馬都尉安徳郡開國公臣楊師道左衛大將軍武陽縣開國公臣李大亮光祿大夫戸部尚書莒國公臣唐儉光祿大夫禮部尚書河間郡王臣孝恭刑部尚書彭城縣開國公臣劉徳威兼太常卿扶風縣開國男臣韋挺少府監安昌縣開國男臣馮長命銀青光錄大夫行尚書左丞濟陽縣開國男臣唐皎亦有不署馮長命唐皎二人官爵姓名者十四年月日將仕郎直𢎞文館臣張龍樹裝某官士亷某官徵某官楊師道起居郎臣褚遂良亦有臣蔡撝裝其𤣥齡士亷魏徵師道君集官爵姓名並同師道後有左屯衛大將軍上柱國通川縣開國男臣姜行本十五年十六年月日文林郎臣張龍樹裝行起居郎臣禇遂良楊師道魏徵房𤣥齡官爵並同上房𤣥齡後無已下人姓名十七年十八年月日守黄門侍郎褚遂良監亡他人官爵姓名是開元中割却十九年月日褚遂良監亡他人官爵姓名是開元中割却開元中𤣥宗購求天下圖書亦命當時鑒識人押署跋尾劉懐信等亦或割去前代名氏以己等名氏代之開元五年月日陪戎副尉王思忠裝亦有張龍樹裝王行真裝文林郎直秘書省臣王知逸監宣義郎行左司禦率府錄事㕘軍臣劉懐信監十年賜名匪矜宣義郎行左驍衛率府倉曹㕘軍臣陸元悌監後至十一年為給事中賜名堅直集賢承議郎行左金吾衛長史臣魏哲監左散騎常侍崇文館學士上柱國舒國公臣褚無量開府儀同三司上柱國梁國公臣姚崇秘書監侍讀昭文館學士上柱國常山縣開國公臣馬懐素銀青光祿大夫行中書侍郎同中書門下平章事監修國史上柱國許國公臣蘇頲銀青光祿大夫守吏部尚書兼侍中監修國史上柱國廣平郡開國公臣宋璟十年月日王思忠裝同上使承議郎守殿中丞知中書尚作事安昌縣開國男臣馮紹正使朝議大夫檢校少府監臣陳義十五年月日王府大農李仙舟裝背内使尹奉祥監是集賢畫院書畫建中十年月日臣賀遂竒劉逸江等檢校副使掖庭令茹蘭芳副使内寺伯臣宋逰瓌已上跋尾押署書畫多同此例今略舉大例言之餘不具載叙古今公私印記太宗皇帝自書貞觀二小字作二小印貞觀𤣥宗皇帝自書開元二小字成一印開元又有集賢印祕閣印翰林印各以判司所収翰林掌圖書定印之印又有𢎞文之印恐是東觀舊印印書者其印至小𢎞文之印更有元和之印恐是官印多印搨本書畫元和之印諸好事家印有東晉僕射周顗印古小雌字周顗又有梁朝徐僧權印徐唐朝魏王泰印龜益太平公主駙馬武延秀玉印胡書四字梵音云三藐母䭾三藐母䭾故潤州刺史贈左散騎常侍徐嶠之印東海嶠之子吏部侍郎㑹稽郡公徐浩浩子璹印㑹稽議郎竇蒙印竇蒙審定蒙弟范陽功曹竇臮印竇臮延王友竇永二小字印軌飛出出出出金部郎中劉繹印彭城侯書畫記起居舍人李造印陶安鄂州司馬張懐瓘弟盛王府司馬懐瓌印張氏永保劍州司馬劉知章印劉氏書印光祿大夫中書令上柱國趙國公鍾紹京印書印彦逺髙祖中書令河東公印河東張氏曾祖相國魏國公印鳥石候瑞祖相國髙平公二字小印鵲瑞又有鵲瑞二字同為一印鵲瑞故相國司徒汧國公李勉印李氏印汧國公之子兵部員外郎李約印約又故相趙國公李吉甫印賛皇故御史大夫黎榦印黎氏故桂州觀察使蕭祐印蕭故相國晉國公韓滉印滉故相國鄴侯李泌印鄴侯圖書刻章故犯法人宰相王涯印永存珍秘僕射馬總印馬氏圖書宣州長史周昉印周昉劍州刺史王朏印王朏張敦簡印齊臣常山之印已上諸印記千百年可為龜鏡别有軍侯安國司馬亭侯益萬古任氏猗歟歸至軍司言事劉鄭淮水司馬已上並未尋討去處皆是識鑒寶玩之家印記並可為驗證蕭公温氏模榻書印之印印信又有褚氏書印非褚河南之印也禇氏書印文逺永福經書印信此外更有諸家印署皆非鑒識但偶獲圖畫便即印之不足為證驗故不具錄若不識圖畫不煩空驗印記雖然自古及近代御府購求之家藏蓄傳授閱翫其人至多是以要明跋尾印記乃是書畫之本業耳論裝背褾軸自晉代已前裝背不佳宋時范曄始能裝背宋武帝時徐爰明帝時虞龢巢尚之徐希秀孫奉伯編次圖書裝背為玅梁武帝命朱异徐僧權唐懐克姚懐珍沈熾文等又加裝䕶國朝太宗皇帝使典儀王行真等裝禠起居郎褚遂良校書郎王知敬等監領凡圖書本是首尾完全著名之物不在輒議割截改移之限若要錯綜次第或三紙五紙三扇五扇又上中下等相揉雜本亡詮次者必宜以好處為首下者次之中者最後何以然凡人觀畫必銳於開卷懈怠將半次遇中品不覺留連以至卷終此虞龢論裝書畫之例於理甚暢凡煮糊必去筋稀緩得所攪之不停自然調熟余往往入少細研薫陸香末出自拙意永去蠧而牢固古人未之思也汧國公家背書畫入少蠟要在密潤此法得宜趙國公李吉甫家云背書要黃硬佘家有數帖黃硬書都不堪侯陰陽之氣以調適秋為上時春為中時夏為下時暑濕之時不可用勿以熟紙背必皺起宜用白滑漫薄大幅生紙紙縫先避人面及要節處若縫縫相當則强急卷舒有損要令㕘差其縫則氣力均平太硬則强急太薄則失力絹素彩色不可擣理紙上白畫可以砧石妥帖之宜造一太平案漆板朱界制其曲直古畫必有積年塵埃須用皁莢清水數宿漬之平案扞去其塵垢畫復鮮明色亦不落補綴擡䇿油絹襯之直其邊際密其隟縫端其經緯就其形制拾其遺脫厚薄均調潤潔平穏然後乃以鏤沉檀為軸首或褁鼊束金為飾白檀身為上香潔去蟲小軸白玉為上水精為次琥珀為下大軸杉木漆頭輕圓最玅前代多用雜寶為飾易為剝壊故貞觀開元中内府圖書一例用白檀身紫檀首紫羅褾織成帶以為官畫之褾或者云書畫以褾軸賈害不宜盡飾余曰裝之珍華裛以藻繡緘縢藴藉方為宜稱其古之異錦具李章武所集錦譜必若大盜至焉亦何計寶惜梁朝大聚圖書自古為盛湘東之敗烟焰漲天此其運也況乎私室寶持子孫不肖大則胠篋以遺勢家小則舉軸以易朝饌此又時也亦何嗟乎記兩京外州寺觀畫壁會昌中多毁折今亦具載亦有好事收得畫壁在人家者兩京寺觀等畫壁太清宫殿内絹上寫𤣥元真是呉薦福寺天后飛白書額淨土院門外兩邊呉畫神鬼南邊神頭上龍為玅西廊菩提院呉畫維摩詰本行變律院北廊張璪畢宏畫西南院佛殿内東壁及廊下行僧並呉畫未了興善寺殿内壁畫至玅失人名按裴録云此寺有劉焉畫恐是西南舍利塔内曹畫西面尹琳畫東廊從南第三院小殿柱間呉畫神工人裝損三藏院閣畫至玅失人名慈恩寺塔内面東西間尹琳畫西面菩薩騎獅子東面騎象塔下南門尉遲畫西壁千鉢文殊尉遲畫南北兩間及兩門呉畫并自題塔北殿前牕間呉畫菩薩殿内楊庭光畫經變色損大殿東軒廊北壁呉畫未了舊傳是呉細看不是大殿東廊從北第一院鄭䖍畢宏王維等白畫入院北壁二神甚玅失人名兩廊壁間閻令畫中間及西廊李果奴畫行僧塔之東南中門外偏張孝師畫地獄變已剝落院内東廊從北第一房間南壁韋鑾畫松樹大佛殿内東壁好畫失人名中三門裏兩面尹琳畫神龍興觀大門内呉畫神已摧剝殿内東壁呉畫明真經變北面從西第二門董諤白畫唐安寺塔下尹琳李真畫北堂内西壁朱審畫山水光宅寺東菩提院内北壁東西偏尉遲畫降魔等變殿内呉生楊廷光畫又尹琳畫西方變𤣥真觀殿内𤣥元及侍真座上陳靜心畫樂天及神殿内外程雅陳靜心畫資聖寺殷仲容題額檀章畫中三門東牕間南北面呉畫髙僧大三門東南壁姚景仙畫經變寺西門直西院外神及院内經變楊廷光畫北圓塔下李真尹琳絹畫菩薩寶刹寺佛殿南楊契丹畫涅槃等變相與斐錄同據斐畫錄亦有鄭畫今不見也西廊陳靜眼畫地獄變又有楊廷光畫興唐寺三門樓下呉畫神東般若院楊廷光畫山水等西院韓幹畫一行大師真徐浩書讃又有呉生周昉絹畫中三門内東西偏兩壁尉遲畫殿軒廊東面南壁呉畫淨土院董諤尹琳楊坦楊喬畫院内次北廊向東塔院内西壁呉畫金剛變工人成色損次南廊呉畫金剛經變及郗后等并自題小殿内呉畫神菩薩帝釋西壁西方變亦呉畫東南角呉弟子李生畫金光明經變講堂内楊廷光畫菩提寺佛殿内東西壁呉畫神鬼西壁工人布色損佛殿壁帶間亦有楊廷光白畫殿内東西北壁並呉畫其東壁有菩薩轉目視人法師文溆亡何令工人布色損矣東壁董諤畫本行經變佛殿上构欄耿昌言畫水族佛殿内東壁楊廷光畫據西京記合有鄭畫今亡萬安觀公主影堂東北小院南行屋門外北壁李昭道畫山水淨域寺據裴畫錄此寺有孫尚子畫今不見三階院東壁張孝師畫地獄變杜懐亮書牓子院門内外神鬼王韶應畫王什書牓子王什杜懐亮書人罕知有書迹甚髙似鍾書景公寺東廊南間東門南壁畫行僧轉目視人中門之東呉畫地獄并題西門内西壁呉畫帝釋并題次南廊呉畫三門内東西畫至妙失人名青龍寺中三門外東西王韶應畫安國寺東車門直北東壁北院門外畫神兩壁及梁武帝郗后等並呉畫并題經院小堂内外並呉畫西廊南頭院西畫堂内南北壁并中三門外東西壁梵王帝釋並楊延光畫三門東西兩壁釋天等呉畫工人成色損東廊大法師院塔内尉遲畫及呉畫大佛殿東西二神呉畫工人成色損殿内維摩變呉畫東北涅槃變楊廷光畫西壁西方變呉畫工人成色損殿内正南佛呉畫輕成色開元觀西廊院天尊殿前龍虎君明真經變及西壁並楊廷光畫門西牕上下楊仙喬畫雲花寺小佛殿有趙武端畫淨土變西廊北院門上北面王知慎畫寶應寺多韓幹白畫亦有輕成色者佛殿東西二菩薩亦幹畫工人成色損西南院小堂北壁張璪畫山水院南門外韓幹畫側坐毗沙門天王北下方西塔院下邊鸞畫牡丹咸宜觀三門兩壁及東西廊並呉畫殿上牕間真人呉畫殿前東西二神解倩畫殿外東頭東西二神西頭東西壁呉生并楊廷光畫牕間寫真及明皇帝上佛公主等圖陳閎畫永壽寺三門裏呉畫神千福寺在安定坊㑹昌中毁寺後却置不改舊額寺額上官昭容書毁寺後有僧收得再置却懸之中三門外東行南太宗皇帝撰聖敎序𢎞福寺沙門懐仁集王右軍書西行楚金和尚法華感應碑顔魯公書徐浩題額碑陰沙門飛錫撰呉通㣲書東塔院額高力士書涅槃鬼神楊惠之書門屋下内外面楊廷光白畫鬼神并門屋下兩面四五間西塔院𤣥宗皇帝題額北廊堂内南嶽智顗思大禪師法華七祖及弟子影弟子壽王主簿韓幹敬貌遺法弟子沙門飛錫撰頌并書繞塔板上傳法二十四弟子盧稜伽韓幹畫裏面呉生畫時菩薩現呉生貌塔北普賢菩薩鬼神似是尹琳畫相傳云是楊廷光畫畫時筆端舍利從空而落塔院門兩面内外及東西向裏各四間呉畫鬼神帝釋極妙塔院西廊沙門懐素草書天師真韓幹畫此東塔𤣥宗感夣置之楚金真呉畫彌勒下生變韓幹正畫細小稠閙院門北邊碑顔魯公書岑勛撰南邊碑張芬書向裏面壁上碑呉通㣲書僧道秀撰造塔人木匠李伏横石作張愛兒石井欄篆書李陽冰石作張愛兒東閣肅宗置面東碑韓擇木八分書王椐撰天台智者大師碑張芬書佛殿東院西行南院殿内有李綸畫普賢菩薩田琳畫文殊師利菩薩崇福寺武后題額西庫牛昭王陁子畫山水東山亭劉整畫山水西庫門外西壁神呉畫自題化度寺殷仲容題額楊廷光楊仙喬畫本行經變盧稜伽畫地獄變今殘兩頭少許耳温國寺淨土院尹琳畫三門内呉畫鬼神南北牕門畫神失人名定水寺王羲之題額從荆州將來殿内東壁北二神西壁三帝釋並張僧繇畫從上元縣移來餘七神及下小神並解倩畫殿内東壁孫尚子畫維摩詰其後屏風臨古迹帖亦玅中間亦孫尚子畫東間不是孫亦玅失人名内東西壁及前面門上並似展畫甚玅前面有三圓光皆突生壁牕間菩薩亦玅奉恩寺中三門外西院北尉遲畫本國王及諸親族次塔下小畫亦尉遲畫此寺本是乙僧宅龍興寺佛殿鄭法輪畫懿徳寺三門樓下兩壁神中三門東西華嚴變並玅三門西廊東靜眼畫山水大殿内畫極玅失人名勝光寺西北院小殿南面東西偏門上王定畫行僧及門間菩薩圓光三門外神及帝釋楊仙喬畫三門北南廊尹琳畫塔東南院周昉畫水月觀自在菩薩掩障菩薩圓光及竹並是劉整成色西明寺𤣥宗朝南薰殿學士劉子臯書額入西門南壁楊廷光畫神兩鋪成色損東廊東面第一間傳法者圖讃褚遂良書第三間利防等四間曇柯迦羅並歐陽通書寺東崇福寺壁碾陳積善畫山水三階院蔡金剛范長壽畫淨法寺殿後張孝師畫地獄變東壁范長壽畫與裴孝源錄同西壁亦玅失人名空觀寺本周時村佛堂遶壁當時名手畫佛堂在寺東廊南院佛殿南面東西門上袁子昻畫又有三絶是佛殿門扇孔雀及二龍崇聖寺西殿内董伯仁畫東殿展子䖍畫展畫與裴錄同西北鄭徳文畫淨景寺殷仲容題額濟度寺殷仲容題額𤣥都觀殿内范長壽畫海覺寺歐陽詢題額三門内王韶應畫小殿前面董畫像雙林塔西面展畫後面云是鄭畫尤玅西南院門北壁畫神失名甚玅或云鄭法士壽果寺殿内畫甚玅失人名紀國寺西禪院小堂鄭法輪畫甚碎褒義寺殿後東西畫似是王定佛殿西壁涅槃變盧稜迦畫自題西禪院殿内杜景祥王元之畫大雲寺東浮圖北有塔俗呼為七寶塔隋文帝造馮提伽畫痩馬并帳幕人物已剝落又東壁北壁鄭法輪畫西壁田僧亮畫外邊四面楊契丹畫本行經據裴錄此寺亦有展畫有田楊鄭並同塔東义手下畫辟邪雙目隨人轉盻三階院牕下曠野雜獸似是張孝師西南淨土院遶殿僧至玅失人名永泰寺殿及西廊李雅畫聖僧東廊懸門楊契丹畫東精舍鄭法士畫滅度變相摠持寺門外東西呉畫成色損佛殿内西畫孫尚子畫三藏院小佛殿四壁尹琳李昌畫堂内李重昌畫恩大師影莊嚴寺兩寺並殷令名題額南門外壁白蕃神尹琳畫中門外東西盧稜迦畫兩壁甚大祕書省薛稷畫鶴賀知章題詩在東祕書㕔郎餘令畫鳯在書閣柱上都不成畫不堪觀先亦有小山水在書閣上今已無御史臺殿中㕔呉畫山水據其畫跡不是呉又蕭桂州祐畫山水將作監劉整畫山水太常寺太卿後㕔梁洽畫山水禪定寺裴孝源畫錄云有陳善見畫西禪寺裴孝源云有孫尚子畫開業寺裴錄云有曹仲達李雅楊契丹鄭法士畫清禪寺裴録云有鄭法士畫延興寺裴録云有鄭法士李雅畫已上上都東都寺觀畫壁福先寺三階院呉畫地獄變有病龍最玅寺三門兩頭亦似呉畫係本寺三階院天宫寺三門呉畫除災患變板上二菩薩張僧縣畫從江南將來長壽寺門裏東西兩壁鬼神呉畫佛殿兩軒行僧亦呉畫菜園精舍内王韶應畫敬愛寺據裴孝源畫錄云有孫尚子畫彦逺按敬愛寺是中宗皇帝為髙宗武后置孫尚子是隋朝畫手裴君所記為謬矣佛殿内菩薩樹下彌勒菩薩塑像麟徳二年自内出王𤣥䇿取到西域所圖菩薩像為様巧兒張壽宋朝塑王𤣥䇿指揮李安貼金東間彌勒像張智藏塑即張壽之弟也陳永承成西間彌勒像竇𢎞果塑已上三處像光及化生等並是劉爽刻殿中門西神竇𢎞果塑殿中門東神趙雲質塑今謂之聖神也此一殿功徳並玅選巧工各騁竒思莊嚴華麗天下共推西禪院殿内佛事并山並竇𢎞果塑東禪院般若臺内佛事中門兩神大門内外四金剛并獅子崑崙各二并迎送金剛神王及四大獅子兩食堂講堂兩聖僧已上並是竇𢎞果塑大殿内東西面壁畫劉行臣描維摩詰盧舍那並劉行臣描趙龕成自餘並聖厯已後劉茂徳皇甫節共成法華太子變劉茂徳成即行臣子西壁西方佛㑹趙武端描十六觀及閻羅王變劉阿祖描西禪院北壁華嚴變張法受描北壁門西一間佛㑹及山水何長壽描人物等張法受描趙龕成東西兩壁西方彌勒變并禪院門外道西行道僧並神龍後王韶應描董忠成禪院内西廊壁畫開元十年呉道子描日藏月藏經變及業報差别變呉道子描翟琰成罪福報應是雜手成所以色損也東禪院殿内十輪變武靜藏描東壁西方變蘇思忠描陳慶子成殿間菩薩及内廊下壁武靜藏描陳慶子成講堂内大寶帳開元三年史小淨起様隨隱起等是張阿乾生銅作并蠟様是李正王兼亮郭兼子天后大香爐髙五尺五寸濶四尺重二千斤又大金銅香爐毛婆羅様後更加木座及須彌山浮趺等髙一丈二尺張阿乾蠟様金銅幡十三口長一丈二尺張李八寫并成畫絹幡十三口金銅脚長一丈二尺張李八寫并成又四口亦長一丈二尺雜手成大院紗廊壁行僧中門内已西並趙武端描惟唐三藏是劉行臣描亦成中門内已東五僧師奴描第六僧已東至東行南頭第二門已南並劉行臣描已北並趙武端描或云劉行臣描中門西邊紗廊外面並聖厯已後劉茂徳描陳庻子成中門内立神大門内坐神並劉行臣描中門東立神及神之東西兩鬼聖厯後有神英法師令何長壽掃却欲重描神英京兆黨何生洛下衆生黨劉行臣時人以何生雖善山水至於畫神不如劉劉為闗東獨步與西京長壽齊名洛下之意抑何進劉不許神英之請還遣行臣之子茂徳續其父畫今中門東神及兩鬼腰已上新接者亦不迨其父矣其日藏月藏經變有病龍又妙於福先寺者殿内則天真山亭院十輪經變華嚴經並武靜藏畫龍王面上蜥蜴及懐中所抱雞尤妙真山亭院北及門樓内兩廂震亶支提二神並劉行臣畫今暗第二門東神亦行臣畫今暗彦逺遊西京寺觀不得遍惟敬愛寺得細探討故為詳備龍興寺西禪院殿東頭展畫八國王分舍利大雲寺門東兩壁鬼神佛殿上菩薩六軀淨土經變閣上婆叟仙並尉遲畫黃犬及鷹最妙𢎞聖寺陳靜眼張志畫昭成寺西廊障日西域記圖楊廷光畫三門下䕶法二神張遵禮畫香爐兩頭淨土變藥師變程遜畫聖慈寺西北禪院程遜畫本行經變維摩詰并諸功徳楊廷光畫𢎞道觀東封圖是呉畫兩京記乃云非名手畫誤也城北老君廟呉畫杜甫詩云五聖聨龍衮千官列雁行畫手看前輩呉生獨擅塲光嚴寺裴孝源云有董伯仁畫天女寺裴云有展畫今不見已上東都㑹昌五年武宗毁天下寺塔兩京各留三兩所故名畫在寺壁者唯存一二當時有好事或掲取陷於屋壁已前所記者存之葢寡先是宰相李徳裕鎮浙西創立甘露寺唯甘露不毁取管内諸寺畫壁置於寺内大約有顧愷之畫維摩詰在大殿外西壁戴安道文殊在大殿外西壁陸探㣲菩薩在殿後面謝靈運菩薩六壁在天王堂外壁張僧繇神在禪院三聖堂外壁張僧繇菩薩十壁在大殿兩頭張僧繇菩薩并神在文殊堂外壁展子䖍菩薩兩壁在大殿外韓幹行道僧四壁在文殊堂内陸曜行道僧四壁在文殊堂内前面唐湊十善十惡在三門外兩頭呉道子僧二軀在釋迦道場外壁呉道子鬼神在僧迦和尚南外壁王陁子須彌山海水在僧伽和尚外壁顧畫維麾詰初置甘露寺中後為盧尚書簡辭所取寶於家以匣之大中七年今上因訪宰臣此畫遂詔壽州刺史盧簡辭求以進賜之金帛以畫示百寮後收入内述古之祕畫珍圖古之祕畫珍圖固多散逸人間不得見之今粗舉領袖則有龍魚河圖六甲隱形圖五帝鈎命決圖孝經祕圖孝經左契圖孝經雌雄圖遁甲開山圖王粲甘泉宫圖漢武漢麟閣圖二武帝一宣帝一鴻都門圖孔聖七十子西王母益地圖舜南都賦圖戴安道雲漢圖劉褒黃帝明堂圖漢武五嶽真形圖漢武韓詩圖十四論語圖二蚩尤王子兵法營陣圖魯班攻戰器械圖黃帝攻法圖伍胥水戰圖呉孫子兵法雲氣圖五星八卦二十八宿圖十二星宫圖三日月交㑹九道圖分野璇璣圖八望氣圖一河圖十三又八卷詩緯圖春秋圖一孝經䜟圖十二浸譚泥圖七八卦八風十二時二十八宿音律圖十一周公成壊吉凶圖一妖怪圖四相宅園地圖一黃帝樊薛許氏相圖一陰陽宅相圖一馬像圖八三王相鷹圖一療馬百病圖四老子黃庭經圖一大蒐神芝圖十二黃帝昇龍圖一山海經圖六又鈔圖一太史公漢書圖八又漢記圖三太史公畫二十八人大荒經圖二十六河圖括地象圖十一天地郊社圖諸鹵簿圖不備錄篇目至多古聖賢帝王圖二又六古瑞應圖二魏帝所撰雜畫圖一魏順應圖四十大駕鹵簿圖三明帝太學圖三列仙傳圖一搜神記圖四荀百國人圖一地形圖一衡張地形方丈圖一秀裴孫子八陣圖一太一三宫用兵成圖二渾天宣夜圖各一日月交㑹圖一註鄭𤣥章賢十二時雲雨氣圖一十二屬神圖一神農本草例圖一周禮圖十四周室王城明堂宗廟圖江圖三劉氏又一張氏呉孫子牝牡八變陣圖二黃石公五星圖𤣥圖一占日雲氣圖京兆夏氏魏氏並有二十八宿分野圖一風角五音圖三禮圖十卷阮諶等撰又十二卷隋文帝開皇二十年勅有司撰左武候執旗侍官夏侯朗畫爾雅圖上下兩卷陳尚書令江灌字徳源至武徳中為隋州司馬并著爾雅賛二卷音六卷忠孝圖二十卷唐故凉州都督李襲譽貞觀三年撰奏上嘉之并傳賛漢明帝畫宫圖五十卷第一起庖犧五十雜畫賛漢明帝雅好畫圖别立畫官詔博洽之士班固賈逵輩取諸經史事命尚方畫工圖畫謂之畫賛至陳思王曹植為賛傳益州學堂圖十畫古聖帝賢臣七十子後代又增漢晉帝王名臣蜀之賢相牧守似東晉時人所撰魯廟孔子弟子圖五是魯國廟堂東西廂畫圖傳國璽圖一姚察撰并記洛陽圖一名楊宫圖狀楊佺期撰區宇圖一百二十八卷每卷首有圖虞茂氏撰職貢圖一外國酋渠諸蕃土俗本末仍各圖其來貢者之狀金樓子言之梁元帝畫中天竺國圖有行記十卷圖三卷明慶三年王𤣥策撰祥瑞圖十卷起天有黃道失撰者符瑞圖十卷行日月楊廷光并集孫氏熊氏圖白澤圖一卷三百二十事出抱朴子黃帝廵東海而遇之古今藝術圖五十卷既畫其形又說其事隋煬帝撰靈秀本草圖六起赤箭終蜻蜓源平仲撰本草圖二十五其形狀蘇敬撰明慶中事易狀圖一靈命本圖二辯靈命圖一右略舉其大綱凡九十有七尚未盡載厯代名畫記卷三
