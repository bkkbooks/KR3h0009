body:
  text: 歴代名畫記卷九唐張彥逺撰唐朝上唐高祖神堯皇帝太宗皇帝中宗皇帝𤣥宗皇帝竝神武聖哲藝亡不周書畫備能非臣下所敢陳述漢王元昌高祖神堯皇帝第七子太宗皇帝之弟少博學能書畫武德三年封魯王十年封漢王為梁州都督坐太子承乾事廢畫漢賢王圖鞍馬鷹鶻傳於代李嗣眞云天人之姿博綜伎藝頗得風韻自然超舉碣館深崇遺迹罕見在上品二閻之上裴孝源云六法俱全萬類不失漢王弟韓王元嘉亦善書畫天后授之太尉善畫龍馬虎豹滕王元嬰亦善畫閻立德上品下閻讓字立德以字行於代父毗在隋以丹青知名已在第八卷中具載與弟立本俱傳家業武德中為尚衣奉御造衮冕大裘等六服腰輿傘扇咸得妙制貞觀初為將作大匠造翠㣲玉華宮稱旨官至工部尚書封大安縣公顯慶元年贈吏部尚書幷州都督諡曰康文成公主降畨圖玉華宮圖鬭雞圖並傳於代立德弟立本上品下顯慶初代立德為工部尚書總章元年拜右相封博陵縣男有應務之才兼能書畫朝廷號為丹青神化初為太宗秦王庫直武德九年命寫秦府十八學士褚亮為贊秦府十八學士駕真圖序曰武德四年太宗皇帝為太尉尚書令雍州牧左右衛大將軍新命為天策上將軍位在三公上乃鋭意經籍怡神藝學開學館以待四方之士乃降敎曰昔楚國尊賢存道先於申穆梁園接士比德至於鄒枚咸以著範前修垂光後烈顧惟菲薄多謝古人高山仰止能亡景慕於是芳蘭始被深冠葢之游丹桂初叢廣旄俊之士既而場苖葢寡空留皎皎之姿喬木徒遷終愧嚶嚶之友所冀通人正訓匡其闕如側席亡倦於齊庭開筵有慚於燕館屬大行臺司勲郎中杜如晦記室考功郎中房𤣥齡及于志寧軍諮祭酒蘇世長天䇿府記室薛收文學禇亮姚察太學博士陸德明孔頴達主簿李𤣥道天䇿倉曹李守素秦王記室虞世南參軍蔡允恭顏相時著作郎記室許敬宗薛元敬太學助敎葢文達興籖蘇朂等或背淮而致千里或通趙以欣三見咸能垂裾邸第委質藩維或𢎞禮度而成典則暢詞學而路風雅優游幕府是用嘉焉宜可以守本官兼文學館學士及薛收卒徵東虞州錄事參軍劉孝孫入館尋遷庫直閻立本圖形貌具題名字爵里仍敎文學褚亮為之像讚勒成一卷號十八學士並給珍膳分為三畨更直宿于閣每軍國務靜參謁歸休即引見論討墳典商畧前載考其得失或夜分而寢又降以温顏禮數甚厚由是天下歸心奇傑之士咸思自効于時預入館者時所傾慕謂之登瀛州云貞觀十七年又詔畫凌煙閣功臣二十四人圖上自為讚貞觀十七年詔曰自古皇王襃崇勲德旣勒名於鍾鼎又圖形於丹青是以甘露良佐麟閣著其美建武功臣雲臺紀其迹司徒趙國公無忌故司空揚州都督河間元王孝恭故司空蔡國公如晦故司空相州都督鄭國文貞公徵司徒梁國公𤣥齡開府儀同三司尚書左僕射申國公士廉開府儀同三司鄂國公敬德特進衛國公靖特進宋國公瑀故輔國大將軍揚州都督裒國忠壯公志𤣥輔國大將軍䕫國公𢎞基故尚書左僕射忠國公通故陜東道大行臺尚書右僕射鄖節公開山故荆州都督譙襄公紹故荆州都督邳襄公順德洛州都督鄖國公張亮光禄大夫吏部尚書陳國公侯君集故左驍衛大將軍郯襄公張公謹左領軍大將軍盧國公程知節故禮部尚書永興文懿公虞世南故户部尚書渝襄公劉政㑹光禄大夫户部尚書莒國公唐儉光禄大夫兵部尚書英國公李勣故徐州都督胡壯公秦叔寳等或材唯棟梁謀猷經逺綢繆帷幄經綸霸圖或學綜經籍德範光茂隱犯同致忠讜日聞或竭力義旗委質藩邸一心表節百戰標奇或授命廟堂闢土方面重氛再朗王畧遐宣契濶中後劬勞師旅賛景業於草昧翼鴻化於隆平茂績嘉庸冠冕列辟昌言直道模範縉紳固以瞻伊呂而連衡邁方召而長騖者矣宜酌故實𢎞兹盛典可並圖畫於凌烟閣庶念功臣之懷亡謝於前載旌賢之義永貽於後昆時天下初定異國來朝詔立本畫外國圖又鄠杜間有蒼虎為患天皇引驍雄千騎取之虢王元鳯太宗之弟也彎弓三十鈞一矢斃之召立本寫貎以旌雄勇國史云太宗與侍臣泛遊春苑池中有奇鳥隨波容與上愛玩不已召侍從之臣歌詠之急召立本寫貎閣中傳呼畫師閻立本立本時已為主爵郎中奔走流汗俯伏池側手揮丹素目瞻坐賔不勝愧赧退戒其子曰吾少好讀書屬詞今獨以丹青見知躬厮役之務辱莫大焉爾宜深戒勿習此藝然性之所好終不能舎及為右相與左相姜恪對掌樞務恪曾立邉功立本唯善丹青時人謂千字文語曰左相宣威沙漠右相馳譽丹青言竝非宰相器咸亨元年復為中書令四年薨諡曰文貞僧悰云閤師與鄭奇態不窮像生變故天下取則竇蒙云直自師心意存功外與夫張鄭了不相干裴云閻師張青出於藍人物衣冠車馬臺閤竝得其妙厯觀古今法則巧思唯二閻楊陸迥出常表張家父子稍居其次彥逺云二閻楊陸雖則畫美張家父子品第居最裴云張在閻下此論未當李嗣真云博陵大安難兄難弟自江左陸謝云亡北朝子華長逝象人之妙號為中興至若萬國來庭奉塗山之玉帛百蠻朝貢接應門之位序折旋矩度端簮奉笏之儀魁詭譎怪鼻飲頭飛之俗盡該毫末備得人情二閻同在上品田舎屏風十二扇位置經略冠絶古今元和十三年彥逺大父相國鎭太原詔取之西域圖王知愼亦榻之永徽朝臣圖昭陵列像圖傳於代彥逺論曰前史稱魏明帝起凌雲閣勅韋誕題榜工人誤先釘榜以籠盛誕釣上去地二十五丈及下鬚髪盡白纔餘氣息遂戒子孫絶此楷法謝安嘗論其事子敬正色荅曰仲將魏之大臣豈有此事若如所説知魏德之不長彥逺嘗以子敬為有識之言閻令雖藝兼繪事時已位列星郎況太宗皇帝洽近侍有拔貂之恩接下臣亡撞郎之急豈得直呼畫師不通官籍至於馳名丹青才多輔佐以閻之才識亦謂厚誣淺薄之俗輕藝嫉能一至於此良可於悒也張孝師下品為驃騎尉尤善畫地獄氣候幽黙孝師曾死復蘇具見㝠中事故備得之呉道𤣥見其畫因號為地獄變竇云迹簡而麄物情皆備除謝顧陸張楊田董展外難可比儔也范長壽下品師法於張僧繇官至司徒校尉風俗圖醉道士圖傳於代僧悰云博贍繁多有所雅尚至於位置不煩經略竇云掣打捉筆落紙如飛雖乏窈窕終是好手何長壽與范同師法但㣲劣於范范何竝有醉道士圖傳於代人云是僧繇所作非也劉竦傳記云張僧繇為醉僧圖僧歛錢與立本添冠子改為道士殊不近理矣尉遲乙僧于闐國人父跋質那具第八卷乙僧國初授宿衛官襲封郡公善畫外國及佛像時人以跋質那為大尉遲乙僧為小尉遲畫外國及菩薩小則用筆𦂳勁如屈鐵盤絲大則灑落有氣槩僧悰云外國鬼神奇形異貎中華罕繼竇云澄思用筆雖與中華道殊然氣正迹高可與顧陸為友劉孝師僧悰云㸃畫不多皆為樞要鳥雀奇變甚為酷似彥逺云不止鳥雀曾見畫他物皆好靳智異僧悰云祖述仲達改張琴瑟變夷為夏肇自斯人在范長壽上王定官至中散大夫尚方令貞觀初得名筆迹甚快本草訓戒圖傳於代僧悰云骨氣不足遒媚有餘菩薩聖僧往往驚絶在張孝師上彥逺按定畫骨氣不甚長旣亡骨氣何故驚絶梁寛呉智敏僧悰云智敏師於寛神襟更為俊逸康薩陀中品或云善陀為振威挍尉僧悰云亡所服膺虚心自悟初花晚葉變態多端異獸奇禽千形萬狀在尉遲下竇云曾見畫人馬措意非高悰公之評過當也王知慎中品下終少府監工書畫與兄知敬齊名僧悰云師於閻寫貎及之筆力爽利風采不凡在張孝師下王韶應或作韶隱畫鬼神深有氣韻竇云善山水人馬檀智敏中品為振武挍尉竇云師於董伯仁僧悰云棟宇樓臺隂陽向背厯觀前古獨見斯人游春戲藝圖傳於世楊須跋中品趙武端下品范龍樹下品周烏孫下品楊德紹下品已上五人國初擅名陳義國初丞相叔達之𤣥孫尤工寫貎𤣥宗少與之善特承恩遇為武德南薰中尚等使銀青光禄大夫少府監殷􅯺殷季友許琨同州僧法明已上四人竝開元中善寫貎常在内庭畫人物海内知名時錢國養未出唐朝七聖圖高祖及諸王圖太宗自定輦上圖開元十八學士圖並殷􅯺韋無忝為之傳於代法明開元十一年勅令寫貎麗正殿諸學士欲畫像書贊於含象亭以車駕東幸遂停初詔殷􅯺季友無忝等分貎之粉本旣成遲囘未上絹張燕公以畫人手雜圖不甚精乃奏追法明令獨貎諸學士法明尤工寫貎圖成進之上稱善藏其本於畫院後數年上更索此圖所由惶懼賴康子元先寫得一本以進上令却送畫院子元復自收之子元卒其子貨之莫知所在今傳搨本張説徐堅賀知章趙冬曦康子元侯行果韋述敬㑹真趙元黙東方顥李子釗呂向母煛陸去泰咸􅘙業余欽孫季良都十七人其官爵具韋述集賢記下卷錢國養開元中善寫貎海内推服竇云衣裳凡鄙未離賤工格律自高足為出衆彥逺云旣言凡鄙賤工安得格律出衆竇君兩句之評自相矛盾左文通善寫貎王陁子善山水幽致峯巒極佳世人言山水者稱陁子頭道子脚竇云山水獨運别是一家絶迹幽居古今無比時有牛昭亦善山水呉道𤣥陽翟人好酒使氣每欲揮毫必須酣飲學書於張長史旭賀監知章學書不成因工畫曾事逍遥公韋嗣立為小吏因寫蜀道山水始創山水之體自為一家其書迹似薛少保亦甚便利初任兖州瑕丘縣尉初名道子𤣥宗召入禁中改名道𤣥因授内敎博士非有詔不得畫張懷瓘云呉生之畫下筆有神是張僧繇後身也可謂知言官至寧王友開元中將軍裴旻善舞劒道𤣥觀旻舞劒見出沒神怪旣畢揮毫益進時又有公孫大娘亦善舞劒器張旭見之因為草書杜甫歌行述其事是知書畫之藝皆須意氣而成亦非懦夫所能作也時有張愛兒學呉畫不成便為揑塑𤣥宗御筆改名仙喬雜畫蟲豸亦妙時又有楊惠之亦善塑像貟名程進雕刻石作隨韓伯通善塑像天后時尚方丞竇𢎞果毛婆羅苑東監孫仁貴德宗朝將軍金忠義皆巧絶過人此軰並學畫迹皆精妙格不甚高呉畫明皇受籙圖十指鍾旭傳於代彥遠云親叔祖主客貟外郎諗有呉畫説一篇在本集翟琰者呉生弟子也呉生毎畫落筆便去多使琰與張藏布色濃澹無不得其所李生失名亦呉弟子善畫地獄佛像有類於呉而稍劣張藏亦呉弟子也裁度麤快思若湧泉寺壁十間不旬而畢然六法不及師之門牆亦好細畫楊庭光與呉同時佛像經變雜畫山水極妙頗有似呉生處但下筆稍細耳盧稜伽呉弟子也畫迹似呉但才力有限頗能細畫咫尺間山水寥廓物像精僃經變佛事是其所長呉生嘗於京師畫總持寺三門大獲泉貨稜伽乃竊畫莊嚴寺三門鋭意開張頗臻其妙一日呉生忽見之驚歎曰此子筆力常時不及我今乃類我是子也精爽盡於此矣居一月稜伽果卒釋教畫源傳於代時有姚景仙能畫寺壁武靜藏善畫鬼神有氣韻東都敬愛寺東山亭院地獄變畫甚妙董㟧字重照開元中多在尚方善雜畫車牛最推其妙盤車圖余亦曾模之陳靜心善寺壁弟靜眼善地獄山水程雅善雜畫楊坦楊仙喬並長安人好圖佛寺鬼神坦子爽亦善之觧倩善鬼神馮紹正開元中任少府監八年為户部侍郎尤善鷹鶻雞雉盡其形態觜眼脚爪毛彩俱妙曾於禁中畫五龍堂亦稱其善有降雲蓄雨之感姜皎上邽人善鷹鳥𤣥宗在藩時為尚衣奉御有先識之明𤣥宗即位累官至太常卿封楚國公開元五年以事廢復拜銀青光禄大夫祕書監十年復流欽州李思訓宗室也即林甫之伯父早以藝稱於當時一家五人並善丹青思訓弟思誨思誨子林甫林甫弟昭道林甫姪湊世咸重之書畫稱一時之妙官至左武衛大將軍封彭城公開元六年贈秦州都督其畫山水樹石筆格遒勁湍瀬潺湲雲霞縹緲時覩神仙之事窅然巖嶺之幽時人謂之大李將軍其人也思訓弟思誨即林甫之父也善丹青任朝散大夫揚州參軍贈禮部尚書李林甫亦善丹青高詹事與林甫詩曰興中唯白雲身外即丹青余曾見其畫迹甚佳山水小類李中舎也思訓子昭道林甫從弟也變父之勢妙又過之官至太子中舎創海圖之妙世上言山水者稱大李將軍小李將軍昭道雖不至將軍俗因其父呼之李湊林甫之姪也初為廣陵倉曹天寳中貶明州象山縣尉年二十八尤工綺羅人物為時驚絶本師閻令但筆迹疎散言其媚態則盡美矣薛稷字嗣通河東汾隂人道衡之曾孫元超之從子詞學名家軒冕繼代景龍末為諫議大夫昭文館學士多才藻工書畫薛稷外祖魏文貞公富有書畫多虞禇手寫表疏稷鋭意模學窮年忘倦睿宗在藩特見引遇拜黄門中書侍郎禮工二尚書先天二年官至銀青光禄大夫太子少保封晉國公竇懷貞累之年六十九尤善花鳥人物雜畫畫鶴知名屏風六扇鶴樣自稷始也郎餘令有才名工山水古賢為著作佐郎撰自古帝王圖按據史傳想像風采時稱精妙曹元廓天后朝為朝散大夫左尚方令師於閻工騎獵人馬山水善於布置天后鑄九鼎於東都備九州山川物產詔命元廓畫樣鍾紹京書時稱絶妙後周北齊梁陳隋武德貞觀永徽等朝臣圖高祖太宗諸子圖秦府學士圖凌烟圖皆傳於代徐嶠之題劉行臣善畫鬼神精采洒落類王韶應東都敬愛寺山亭院西壁有鬼神抱野雞實為妙手暢𧦬善山水似李將軍鞏子明瑾妙過於父楊寧楊昇望賢宫圖安禄山真張萱已上三人並善畫人物寧以開元十一年為史館畫直萱好畫婦女嬰兒有妓女圖乳母將嬰兒圖按羯鼔圖鞦韆圖虢國婦人出遊圖傳於代尹琳善佛事神鬼寺壁高宗時得名筆跡快利今京師慈恩寺塔下南面師利普賢極妙李仲昌李嗣真竝琳弟子竝善佛道鬼神韋无忝官至左武衛將軍善鞍馬鶻象鷹圖雜獸皆妙韋无蹤乃无忝弟善寫貎朱抱一開元二十二年直集賢善寫貎寫張果先生真為好事所傳竺元標蔡金剛毛嵩姚彥山程遜善寺壁禽獸董好子善人物楊樹兒耿純任貞亮開元中直集賢時有畫直邵齋欽書手吉曠皆解畫陸庭曜善人物鬼神有氣韻暢整李相國陳慤劉智敏史晟何君墨京元成崔霞冷元琇馬光業李蠻子馬樹鷹祝丘潘細衣周子敬段去惑僧智瑰善山水鬼神氣韻洒落已上皆唐朝以來名手畫工有同蘭菊叢芳競秀蹤跡布在人間姓名不可遺棄殷令名陳郡人父不害累代工書畫殷聞禮字大端書畫妙過於父武德初為中書舎人趙王友兼侍讀𢎞文館學士聞禮子仲容天后任太僕祕書丞工部郎中申州刺史善書畫工寫貎及花鳥妙得其真或用墨色如兼五采談皎善畫人物有態度衣裳潤媚但格律不高大髻寛衣亦當時所尚與李湊小相類武惠妃舞圖佳麗寒食圖佳麗伎樂圖並傳於代僧金剛三藏獅子國人善西域佛像運筆持重非常畫可擬東京廣福寺木塔下素像皆三藏起樣張遵禮善畫鬬將鞍馬戈矛器械用筆塹差小畫尤佳王紹宗瑯琊人父修禮畫跡與殷仲容相類亦善書官至祕書少監宋令文亦書畫皆善司馬承禎字子微自梁陶隠居至先生四世傳授仙法開元中自天台徵至天子師之十五年至王屋山勅造陽臺觀居之嘗畫於屋壁又工篆𨽻詞采衆藝皆類於隠居焉制雅琴鎮銘羙石為之詞刻精絶開元中彦逺高王父河東公獲受敎於先生𤣥宗皇帝制碑具述其妙二十三年屍解白雲從堂户出雙鶴繞壇而上年八十一諡貞一先生盧鴻一名浩然高士也工八分書善畫山水樹石隠于嵩山開元初徴拜諌議大夫不受釋翛然俗姓裴氏楚州刺史思訓之子為人恢誕強學不成一名好朋從詩酒善丹青工山水曉解絲竹卒年三十九開元中嘗夜醉卧街犯禁乃為詩曰遮莫鼕鼕鼔須傾滿滿盃金吾如借問報道玉山頺官不罪之或云道士鄭䖍高士也蘇許公為宰相申以忘年之契薦為著作郎開元二十五年為廣文舘學士飢窮轗軻好琴酒篇詠工山水進獻詩篇及書畫𤣥宗御筆題曰鄭䖍三絶與杜甫李白為詩酒友禄山授以偽水部員外郎國家收復貶台州司户鄭逾善山水天寳中得名於梁宋間逾即鄭遷之弟遷有書名李果奴筆迹調潤天寳中寫貎人物及僧佛為妙元和中有李士昉即果奴之孫筆迹及其祖寫貎極妙在翰林集賢曹霸魏曹髦之後髦畫稱于後代霸在開元中已得名天寳末每詔寫御馬及功臣官至左武衛將軍韓幹大梁人王右丞維見其畫遂推奬之官至太府寺丞善寫貎人物龍朔功臣圖姚崇及安禄山圖𤣥宗試馬圖寕王調馬打毬圖並傳於代尤工鞍馬初師曹霸後自獨擅杜甫曹霸畫馬歌曰弟子韓幹早入室亦能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣凋䘮彦逺以杜甫豈知畫者徒以幹馬肥大遂有畫肉之誚古人畫馬有八駿圖或云史道碩之迹或云史秉之迹皆螭頸龍體矢激電馳非馬之狀也晉宋間顧陸之輩已稱改歩周齊間董展之流亦云變態雖權奇滅沒乃屈產蜀駒尚翹舉之姿乏安徐之體至於毛色多騧騮騅駮無他奇異𤣥宗好大馬御廏至四十萬遂有沛艾大馬命王毛仲為監牧使燕公張説作駉牧頌天下一統西域大宛歲有來獻詔於北地置羣牧筋骨行歩久而方全調習之能逸異並至骨力追風毛彩照地不可名狀號木槽馬聖人舒身安神如據牀榻是知異於古馬也時主好藝韓君間生遂命悉圖其駿則有玉花驄照夜白等時岐薛寧申王廏中皆有善馬幹並圖之遂為古今獨歩禄山之亂沛艾馬種遂絶韓君端居亡事忽有人詣門稱鬼使請馬一匹韓君畫馬焚之他日見鬼使乘馬來謝其感神如此弟子孔榮為上足陳閎為永王府長史善畫寫貎工鞍馬與韓同時家蓄圖畫絶多寫安禄山圖𤣥宗馬射圖上黨十九瑞圖孟仲暉善寫貎筆迹類陳閎又似閻令時有杜景祥王允之竝畫迹與仲暉相近也厯代名畫記卷九
