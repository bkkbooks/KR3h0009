  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0009_WYG_010-1a, image: WYG0812/WYG0812-0350c.png}
body:
  text: 厯代名畫記卷十唐張彦逺撰唐朝下王維字摩詰太原祁人年十九進士擢第與弟縉竝以詞學知名官至尚書右丞有髙致信佛理藍田南置别業以水木琴書自娱工畫山水體涉今古人家所蓄多是右丞指揮工人布色原野簇成逺樹過於樸拙復務細巧翻更失真清源寺壁上畫輞川筆力雄壯常自制詩曰當世謬詞客前身應畫師不能捨餘習偶被時人知誠哉是言也余曽見破墨山水筆迹勁爽張諲官至刑部貟外郎明易象善草𨽻工丹青與王維李頎等為詩酒丹青之友尤善畫山水王維答詩曰屏風誤㸃惑孫郎團扇草書輕内史李頎詩曰小王破體閒文䇿落日梨花照空壁書㻣記室妬風流畫與將軍作勍敵畫一作書劉方平工山水樹石汧國公李勉甚重之王熊官至潭州都督嘗與張燕公唱和詩句善湘中山水似李將軍意緒不卑但筆迹輕細王象有畫鹵簿圖傳於代或云是熊兄弟田琦雁門人武徳功臣兵部尚書徳平之子善寫貌人物官至汝南太守尤善八分小篆寫洪崖子橘术圗傳於代竇師綸字希言納言陳國公抗之子初為太宗秦王府諮議相國録事參軍封陵陽公性巧絶草創之際乘輿皆闕勅兼益州大行臺撿挍修造凡創瑞錦宫綾章彩竒麗蜀人至今謂之陵陽公様官至太府卿銀坊卭三州刺史髙祖太宗時内庫瑞錦對雉鬬羊翔鳯游麟之狀創自師綸至今傳之江都王緒霍王元軌之子太宗皇帝猶子也多才藝善書畫鞍馬擅名垂拱中官至金州刺史時有李逖者工畫蠅蝶蜂蟬之類李平鈞宗室也淮安王神通之曾孫為江陵府法曹參軍汴州陳留令平鈞工山水小篆平鈞之叔李權工八分叔樞工小篆崔陽元李炅張惟亘李滔張通耿昌言弟昌期已上七人並工山水雜畫通尤精贍周古言中宗時善寫貌及婦女有宫禁寒食圖秋思圖傳於代時有嚴果楊徳本並吴人善雜畫貝俊一作具後李韶魏晉孫蒯亷已上四人竝工花鳥俊尤工鷹鶻蒯亷最為妙白旻官至同州澄城令工花鳥鷹鶻觜𤓰纖利甚得其趣旻善歌常醉酣歌闋便畫自娯韓嶷工婦女雜畫善布色時有宇文肅善小畫金玉鐫刻之様禽獸葩葉之能髙江車道政二人竝善冩貌道政兼善佛事迹簡而筆健嗣滕王湛然貞元四年為殿中監兼禮部尚書闕鶻使善畫花鳥蜂蝶官至撿挍兵部尚書太子詹事年八十四齊皎髙陽人父玘撿挍兵部郎中皎善外蕃人馬工山水學小楷古篆善射曉音律建中四年官至澤州刺史年五十五彦逺大父髙平公有重名皎每以書畫及篇章求知焉至今予家箧笥中猶有齊君少年時書畫觀其意趣雖髙筆力未勁後見其功用至者則雄壯矣一本云名敀皎弟暎性雅正好學善山水貞元元年為中書舎人二年拜中書侍郎平章事河間縣男三年貶官䕫州七年為桂府觀察使轉江西觀察使十一年贈禮部尚書諡曰忠年四十八初暎於東都舉進士應宏詞彦逺曽祖魏國公為河南尹兼留守愛其藝每加奬焉奏為河南府參軍及魏公罷相為左僕射暎已拜相矣魏公再入中樞暎已貶官䕫州一本名映朱審吴興人工畫山水深沉瓌壯險黒磊落湍瀨激人平逺極目建中年頗知名王宰蜀中人多畫蜀山玲瓏窳窆巉嵯巧峭畢宏大厯二年為給事中畫松石於左省㕔壁好事者皆詩詠之改京兆少尹為左庶子樹石擅名於代樹木改步變古自宏始也楊公南名炎炎華隂人孝著三代門樹六闕風骨俊秀神情爽邁善山水髙竒雅贍大厯四年為中書門下侍郎建中元年遷左僕射流貶年五十五余觀楊公山水圗想見其為人魁岸洒落也史瓉官至省郎善畫鞍馬人物裴諝字士明河東人以明經進畫山水極有思貞元中為吏部侍郎兼御史大夫四年為太子賔客左散騎常侍五年為兵部侍郎河南尹貞元元年年七十五贈兵部尚書韋鑒工龍馬妙得精氣鑒弟鑾工山水松石雖有其名未免古拙鑒子鶠工山水髙僧竒士老松異石筆力勁健風格髙舉善小馬牛羊山原俗人空知鶠善馬不知松石更佳也咫尺千尋駢柯攅影烟霞翳薄風雨颼飀輪囷盡偃葢之形宛轉極盤龍之狀天竺胡僧圗渡水僧圗小馬放牧圗並傳於代張璪字文通吴郡人初相國劉晏知之相國王縉奏撿挍祠部貟外郎鹽鐡判官坐事貶衡州司馬移忠州司馬尤工樹石山水自撰繪境一篇言畫之要訣詞多不載初畢庻子宏擅名於代一見驚歎之異其唯用禿毫或以手摸絹素因問璪所受璪曰外師造化中得心源畢宏於是閣筆彦逺毎聆長者說璪以宗黨常在予家故予家多璪畫曽令畫八幅山水障在長安平原里破墨未了值朱泚亂京城騷擾璪亦登時逃去家人見畫在幀蒼忙掣落此鄣最見張用思處又有士人家有張松石幛士人云亡兵部李貟外約好畫成癖知而購之其家弱妻已練為衣裏矣唯得兩幅雙柏一石在焉嗟惋久之作繪練紀述張畫意極盡此不具載具李約貟外集陳曇字𤣥成國初丞相叔達之後明經出身河南尹嚴武薦為參軍昭義軍節度使李抱真辟為從事貞元十四年官至衡州刺史邕管經畧使兼御史中丞工山水有情趣但峯巒少竒徃徃繁碎顧況字逋翁吴興人不修撿操頗好詩詠善畫山水初為韓晉公江南判官入為著作佐郎久次不遷乃嘲誚宰相為憲司所劾貞元五年貶饒州司户居茅山以夀終有畫評一篇未為精當也鄭審事具彦逺所撰彩牋詩集沈寧亦善樹石山水有格律師張璪而少劣劉商官至檢校禮部郎中汴州觀察判官少年有篇詠髙情工畫山水樹石初師於張璪後自造真為意自張貶竄後嘗惆悵賦詩曰苔石蒼蒼臨澗水溪風裊裊動松枝世間惟有張通㑹流向衡陽那得知或云商後得道劉整任祕書省正字善山水有氣象時有劉之竒亦能山水邊鸞善畫花鳥精妙之極至於山花園蔬亡不偏寫為右衛長史花鳥冠于代而有筆迹于錫善畫花鳥及鷄強頴善水鳥梁廣工花鳥善賦彩筆迹不及邊鸞陳庶揚州人師邊鸞花鳥尤善布色陳恪工山水師張鄭有氣韻人物鞍馬蟲禽竝精于積善山水妙過於父一云陳格戴重席工子女極精細周昉字景𤣥官至宣州長史初効張萱畫後則小異破極風姿全法衣冠不近閭里衣裳勁簡彩色柔麗菩薩端嚴妙創水月之體蜂蝶圖按筝圖楊真人陸真人圖五星圖傳於代趙博文尚書左丞涓之子也畫子母犬兎善寫貌應進士不第兄博宣亦解畫太原王朏終劒南刺史師昉畫子女菩薩但不及昉之精密余大父髙平公首末提奬之鄭寓善果之後也學昉畫天王菩薩有思韓滉字太沖官至金紫光禄大夫淛東西兩道節度使左僕射同平章事封晉國公貞元三年年六十五贈太傅諡忠肅工𨽻書章草雜畫頗得形似牛羊最佳戴嵩韓晉公之鎮浙右署為巡官師晉公之畫不善他物唯善水牛而已田家川原亦有意嵩弟嶧亦善水牛李漸官至忻州刺史善蕃人蕃馬騎射射雕放牧川原之妙筆迹氣調古今亡儔子仲和能繼其藝而筆力不及其父今相國令孤公奕代為相家富圗畫即忻州孫家有小畫人馬幛是尤得意者憲宗曾取置禁中後却賜還嘗以示余蕭祐畫山水甚有意思為桂州觀察使周太素終尚書郎善畫花鳥佛像麴庭善山水格不甚髙但細巧耳蕭悅協律郎工竹一色有雅趣張志和字子同㑹稽人性髙邁不拘撿自稱烟波釣徒著𤣥真子十卷書迹狂逸自為漁歌便畫之甚有逸思肅宗朝官至左金吾衛錄事參軍本名龜齡詔改之顔魯公與之善陸羽等嘗為食客侯莫陳厦字重構工山水用意極精㑹稽僧道芬鄭町處士滎陽人梁洽處士天台項容處士青州呉恬處士一名玢字建康已上竝畫山水道芬格髙鄭町淡雅梁洽美秀項容頑澀呉恬險巧恬有畫山水錄記平生所畫在絹素者凡百餘面傳之好事自云初夢寐有神人指授畫法恬好為頑石氣象深險能為雲而氣象蓊格王黙師項容風顛酒狂畫松石山水雖乏髙竒流俗亦好醉後以頭髻取墨抵於絹畫王黙早年授筆法於台州鄭廣文䖍貞元末於潤州殁舉柩若空時人皆云化去平生大有竒事顧著作知新亭監時黙請為海中都巡問其意云要見海中山水耳為職半年解去爾後落筆有竒趣顧生乃其弟子耳彦逺從兄監察御史厚與余具道此事然余不甚覺黙畫有竒厯代名畫記卷十
